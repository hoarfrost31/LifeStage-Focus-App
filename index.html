<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="LifeStage Focus">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <title>LifeStage Focus App</title>
  <style>
    :root {
      --bg-top: #060606;
      --bg-bottom: #111111;
      --panel: rgba(18, 18, 18, 0.84);
      --panel-soft: rgba(24, 24, 24, 0.9);
      --border: rgba(255, 255, 255, 0.08);
      --text: #f7fbff;
      --muted: #9b9b9f;
      --accent: #d8dde6;
      --danger: #ff8c98;
      --success: #7ad8a5;
      --shadow: 0 18px 42px rgba(0, 0, 0, 0.28);
      --timeline-hour-height: 68px;
      --block-min-height: 64px;
      --timeline-padding-top: 18px;
      --timeline-padding-bottom: 24px;
    }

    body.compact-mode {
      --timeline-hour-height: 24px;
      --block-min-height: 42px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background-color: #0a0a0a;
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.06), transparent 24%),
        radial-gradient(circle at top right, rgba(255, 255, 255, 0.04), transparent 20%),
        linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
      color: var(--text);
      overscroll-behavior-y: none;
      overscroll-behavior-x: none;
    }

    body {
      display: flex;
      justify-content: center;
      padding: calc(10px + env(safe-area-inset-top, 0px)) 12px calc(10px + env(safe-area-inset-bottom, 0px));
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      overflow-x: hidden;
    }

    .app-shell {
      width: 100%;
      max-width: 420px;
      min-height: calc(100vh - 32px);
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
    }

    .phase-rail,
    .timeline-scroll,
    .saved-timeline-list,
    .tasks-list,
    .block-notes-stack {
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.18) rgba(255, 255, 255, 0.04);
    }

    .phase-rail::-webkit-scrollbar,
    .timeline-scroll::-webkit-scrollbar,
    .saved-timeline-list::-webkit-scrollbar,
    .tasks-list::-webkit-scrollbar,
    .block-notes-stack::-webkit-scrollbar {
      width: 8px;
    }

    .phase-rail::-webkit-scrollbar-track,
    .timeline-scroll::-webkit-scrollbar-track,
    .saved-timeline-list::-webkit-scrollbar-track,
    .tasks-list::-webkit-scrollbar-track,
    .block-notes-stack::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 999px;
    }

    .phase-rail::-webkit-scrollbar-thumb,
    .timeline-scroll::-webkit-scrollbar-thumb,
    .saved-timeline-list::-webkit-scrollbar-thumb,
    .tasks-list::-webkit-scrollbar-thumb,
    .block-notes-stack::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.22), rgba(255, 255, 255, 0.12));
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .phase-rail::-webkit-scrollbar-thumb:hover,
    .timeline-scroll::-webkit-scrollbar-thumb:hover,
    .saved-timeline-list::-webkit-scrollbar-thumb:hover,
    .tasks-list::-webkit-scrollbar-thumb:hover,
    .block-notes-stack::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.28), rgba(255, 255, 255, 0.16));
    }

    .card {
      background:
        linear-gradient(180deg, rgba(26, 26, 26, 0.94), rgba(15, 15, 15, 0.98));
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px 0;
    }

    .section-header.compact-header {
      padding-top: 10px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .section-header h2 {
      margin: 0;
      font-size: 1rem;
    }

    .bottom-nav-card {
      position: sticky;
      bottom: calc(6px + env(safe-area-inset-bottom, 0px));
      padding: 5px;
      z-index: 8;
      background:
        linear-gradient(180deg, rgba(28, 28, 28, 0.96), rgba(16, 16, 16, 0.98));
      box-shadow:
        0 18px 42px rgba(0, 0, 0, 0.34),
        inset 0 0 0 1px rgba(255, 255, 255, 0.02);
    }

    .bottom-nav {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      gap: 6px;
      width: 100%;
      align-items: center;
    }

    .tab-button {
      border: 0;
      border-radius: 14px;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-weight: 600;
      font-size: 0.8rem;
      padding: 10px 12px;
      cursor: pointer;
      touch-action: manipulation;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 42px;
    }

    .tab-button.active {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.06));
      color: var(--text);
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.08),
        0 6px 18px rgba(0, 0, 0, 0.16);
    }

    .tab-icon {
      width: 16px;
      height: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: currentColor;
      opacity: 0.92;
      flex-shrink: 0;
    }

    .tab-icon svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .ghost-button,
    .primary-button,
    .fab,
    .danger-button {
      border: 0;
      border-radius: 16px;
      cursor: pointer;
      font: inherit;
      transition: transform 0.18s ease, opacity 0.18s ease, background 0.18s ease;
      touch-action: manipulation;
    }

    button:active {
      transform: scale(0.98);
    }

    .ghost-button {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: var(--text);
      padding: 9px 13px;
    }

    .icon-button {
      width: 38px;
      height: 38px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      font-size: 1rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .primary-button {
      background: linear-gradient(135deg, #f2f2f3, #c9cbd1);
      color: #090909;
      font-weight: 600;
      padding: 12px 16px;
    }

    .header-add-button {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      padding: 0;
      font-size: 1.15rem;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .danger-button {
      background: rgba(255, 127, 140, 0.12);
      color: var(--danger);
      padding: 12px 16px;
      font-weight: 500;
    }

    .phases-card {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      padding-bottom: 12px;
    }

    .tasks-card {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      padding-bottom: 12px;
    }

    .tasks-wrap {
      padding: 10px 12px 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
      min-height: 0;
    }

    .tasks-actions {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      flex-shrink: 0;
    }

    .tasks-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
      min-height: 0;
      padding-right: 2px;
      flex: 1;
    }

    .task-item {
      display: grid;
      grid-template-columns: auto auto 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 12px 12px 12px 10px;
      border-radius: 18px;
      background: rgba(20, 20, 20, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.06);
      padding-left: calc(10px + (var(--task-depth, 0) * 16px));
    }

    .task-item.dragging {
      opacity: 0.92;
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.28);
      z-index: 3;
      position: relative;
      pointer-events: none;
    }

    .task-toggle {
      width: 22px;
      height: 22px;
      padding: 0;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.03);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #111;
      flex-shrink: 0;
    }

    .task-expand {
      width: 22px;
      height: 22px;
      padding: 0;
      border-radius: 999px;
      border: 0;
      background: rgba(255, 255, 255, 0.05);
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .task-expand svg {
      width: 12px;
      height: 12px;
      display: block;
      transition: transform 0.18s ease;
    }

    .task-expand.expanded svg {
      transform: rotate(90deg);
    }

    .task-expand-placeholder {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }

    .task-toggle.done {
      background: linear-gradient(135deg, #f2f2f3, #c9cbd1);
      border-color: transparent;
    }

    .task-toggle svg {
      width: 12px;
      height: 12px;
      display: block;
      opacity: 0;
    }

    .task-toggle.done svg {
      opacity: 1;
    }

    .task-main-button {
      all: unset;
      display: block;
      min-width: 0;
      cursor: pointer;
      touch-action: none;
    }

    .task-title {
      min-width: 0;
      font-size: 0.92rem;
      line-height: 1.35;
      color: var(--text);
      word-break: break-word;
    }

    .task-item.done .task-title {
      color: rgba(255, 255, 255, 0.5);
      text-decoration: line-through;
      text-decoration-color: rgba(255, 255, 255, 0.22);
    }

    .task-meta {
      margin-top: 3px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 0.68rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .task-subtask-badge {
      color: rgba(255, 255, 255, 0.54);
    }

    .task-block-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 7px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: #ececef;
      text-transform: none;
      letter-spacing: 0;
      font-size: 0.72rem;
    }

    .task-delete {
      width: 34px;
      height: 34px;
      padding: 0;
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .task-delete svg {
      width: 15px;
      height: 15px;
      display: block;
    }

    .tasks-empty {
      padding: 18px 14px;
      border-radius: 18px;
      border: 1px dashed rgba(255, 255, 255, 0.08);
      background: rgba(16, 16, 16, 0.6);
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.45;
    }

    .linked-tasks-panel {
      margin-top: auto;
      padding: 10px 0 0;
      border-radius: 0;
      background: transparent;
      border: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .linked-tasks-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .linked-tasks-title {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.46);
    }

    .linked-tasks-add {
      width: 30px;
      height: 30px;
      border-radius: 999px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      line-height: 1;
    }

    .linked-tasks-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .linked-task-inline-form {
      display: none;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      align-items: center;
      margin-top: 2px;
    }

    .linked-task-inline-form.open {
      display: grid;
    }

    .linked-task-inline-input {
      min-width: 0;
      padding: 10px 12px;
      border-radius: 14px;
    }

    .linked-task-inline-action {
      width: 34px;
      height: 34px;
      padding: 0;
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
    }

    .linked-task-inline-action svg {
      width: 14px;
      height: 14px;
      display: block;
    }

    .linked-task-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 8px 9px;
      border-radius: 14px;
      background: rgba(12, 12, 12, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .linked-task-item.dragging {
      opacity: 0.92;
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.28);
      z-index: 3;
      position: relative;
      pointer-events: none;
    }

    .linked-task-item.done .linked-task-text {
      color: rgba(255, 255, 255, 0.46);
      text-decoration: line-through;
      text-decoration-color: rgba(255, 255, 255, 0.2);
    }

    .linked-task-toggle,
    .linked-task-edit {
      width: 28px;
      height: 28px;
      padding: 0;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .linked-task-toggle svg,
    .linked-task-edit svg {
      width: 13px;
      height: 13px;
      display: block;
    }

    .linked-task-toggle.done {
      background: linear-gradient(135deg, #f2f2f3, #c9cbd1);
      color: #101010;
      border-color: transparent;
    }

    .linked-task-toggle:not(.done) svg {
      opacity: 0;
    }

    .linked-task-text {
      min-width: 0;
      font-size: 0.84rem;
      color: var(--text);
      line-height: 1.35;
      word-break: break-word;
      touch-action: none;
    }

    .linked-tasks-empty {
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.45;
      padding: 4px 2px 0;
    }

    .block-notes-stack,
    .task-notes-stack {
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      background: rgba(18, 18, 18, 0.96);
      padding: 0 14px 14px;
      min-height: 320px;
      display: flex;
      flex-direction: column;
      flex: 1 1 auto;
      overflow-y: auto;
    }

    .task-notes-stack {
      border: 0;
      border-radius: 0;
      background: transparent;
      padding: 0;
      min-height: 0;
      overflow: visible;
    }

    .block-notes-editor,
    .task-notes-editor {
      min-height: 190px;
      padding: 14px 0 0;
      color: var(--text);
      font: inherit;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
      outline: none;
      flex: 0 0 auto;
    }

    .task-notes-editor {
      min-height: 140px;
      padding-top: 0;
    }

    .task-notes-editor p,
    .task-notes-editor div {
      margin: 0 0 0.9em;
    }

    .task-notes-editor ul,
    .task-notes-editor ol {
      margin: 0 0 1em;
      padding-left: 1.35em;
    }

    .task-notes-editor[contenteditable="false"] {
      cursor: default;
    }

    .task-notes-editor.view-mode {
      opacity: 0.96;
    }

    .block-notes-editor:empty::before,
    .task-notes-editor:empty::before {
      content: attr(data-placeholder);
      color: var(--muted);
      pointer-events: none;
    }

    .phase-rail {
      display: flex;
      flex-direction: column;
      gap: 0;
      padding: 12px 14px 0;
      flex: 1;
      min-height: 0;
      overflow-y: auto;
    }

    .phase-connector {
      position: relative;
      height: 26px;
      margin-left: 18px;
      width: 16px;
      flex-shrink: 0;
    }

    .phase-connector::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 0;
      bottom: 0;
      width: 2px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.05));
    }

    .phase-chip {
      width: 100%;
      padding: 15px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: var(--panel-soft);
      color: var(--text);
      text-align: left;
      scroll-snap-align: start;
      position: relative;
      overflow: hidden;
    }

    .panel-hidden {
      display: none;
    }

    .phase-chip::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 6px;
      background: var(--phase-color, #b6c0d0);
    }

    .phase-chip:not(.active) {
      background: rgba(20, 20, 20, 0.86);
      border-color: rgba(255, 255, 255, 0.04);
    }

    .phase-chip:not(.active)::before {
      background: rgba(255, 255, 255, 0.14);
    }

    .phase-chip.active {
      border-color: rgba(255, 255, 255, 0.14);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.03),
        0 12px 24px rgba(0, 0, 0, 0.18);
    }

    .phase-topline {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .phase-dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: var(--phase-color, #b6c0d0);
    }

    .phase-chip:not(.active) .phase-dot {
      background: rgba(255, 255, 255, 0.18);
    }

    .phase-badge {
      margin-left: auto;
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }


    .phase-name {
      font-size: 0.98rem;
      font-weight: 600;
      line-height: 1.3;
    }

    .phase-description {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .phase-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .phase-edit {
      border: 0;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.74rem;
      cursor: pointer;
    }

    .phase-toggle {
      border: 0;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.72rem;
      font-weight: 600;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.08);
      color: var(--muted);
    }

    .phase-toggle.active {
      background: rgba(255, 255, 255, 0.14);
      color: var(--text);
    }

    .color-select-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .color-preview-dot {
      width: 16px;
      height: 16px;
      border-radius: 999px;
      background: var(--phase-color, #b6c0d0);
      border: 1px solid rgba(255, 255, 255, 0.14);
      flex-shrink: 0;
    }

    .timeline-card {
      padding-bottom: 12px;
      overflow: hidden;
      flex: 1;
      min-height: 0;
    }

    .timeline-summary {
      display: none;
    }

    .timeline-scroll {
      margin: 12px 8px 0;
      padding: 0 8px;
      overflow-y: auto;
      max-height: min(76vh, 1100px);
    }

    body.compact-mode .timeline-scroll {
      max-height: calc(100vh - 138px);
    }

    .timeline {
      position: relative;
      min-height: calc(24 * var(--timeline-hour-height) + var(--timeline-padding-top) + var(--timeline-padding-bottom));
      padding-top: var(--timeline-padding-top);
      padding-bottom: var(--timeline-padding-bottom);
    }

    .hour-line {
      position: absolute;
      left: 0;
      right: 0;
      height: var(--timeline-hour-height);
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      pointer-events: none;
    }

    .hour-label {
      position: absolute;
      left: 0;
      top: 0;
      width: 62px;
      transform: translateY(-0.7rem);
      color: #9a9a9e;
      font-size: 0.74rem;
      letter-spacing: 0.04em;
      display: inline-flex;
      align-items: center;
      gap: 6px;

    async function initialize() {
      hydrateState();
      initializeFirebase();
      populateColorOptions();
      bindEvents();
      syncBlockNotesFieldToEditor();
      syncTaskNotesFieldToEditor();
      registerServiceWorker();
      render();
      await hydrateFromCloud();
      scheduleNowUpdater();
    }

    function populateColorOptions() {
      const colorOptionsMarkup = COLOR_OPTIONS.map((option) =>
        `<option value="${option.value}">${option.label}</option>`
      ).join("");
      elements.phaseColor.innerHTML = colorOptionsMarkup;
      elements.phaseColorActionSelect.innerHTML = colorOptionsMarkup;
      updatePhaseColorPreview();
    }

    function updatePhaseColorPreview() {
      const value = elements.phaseColor.value || COLOR_OPTIONS[0].value;
      elements.phaseColorPreview.style.setProperty("--phase-color", value);
      elements.phaseColorPreviewAction.style.setProperty("--phase-color", value);
      elements.phaseColorActionSelect.value = value;
    }

    function bindEvents() {
      elements.tabTasks.addEventListener("click", () => setActiveTab("tasks"));
      elements.tabPhases.addEventListener("click", () => setActiveTab("phases"));
      elements.tabTimeline.addEventListener("click", () => setActiveTab("timeline"));
      elements.addTaskButton.addEventListener("click", () => openTaskModal());
      elements.addLinkedTaskButton.addEventListener("click", handleAddLinkedTask);
      elements.tasksList.addEventListener("click", handleTaskListClick);
      elements.tasksList.addEventListener("pointerdown", handleTaskDragStart);
      elements.tasksList.addEventListener("pointermove", handleTaskDragMove);
      elements.tasksList.addEventListener("pointerup", handleTaskDragEnd);
      elements.tasksList.addEventListener("pointercancel", handleTaskDragEnd);
      elements.linkedTasksList.addEventListener("click", handleLinkedTaskListClick);
      elements.linkedTasksList.addEventListener("pointerdown", handleLinkedTaskDragStart);
      elements.linkedTasksList.addEventListener("pointermove", handleLinkedTaskDragMove);
      elements.linkedTasksList.addEventListener("pointerup", handleLinkedTaskDragEnd);
      elements.linkedTasksList.addEventListener("pointercancel", handleLinkedTaskDragEnd);
      elements.addPhaseButton.addEventListener("click", () => openPhaseModal());
      elements.phaseColor.addEventListener("change", updatePhaseColorPreview);
      elements.phaseColorActionSelect.addEventListener("change", handlePhaseQuickColorChange);
      elements.phaseSettingsButton.addEventListener("click", handlePhaseSettingsToggle);
      elements.toggleCompactButton.addEventListener("click", handleCompactToggle);
      elements.installAppButton.addEventListener("click", handleInstallApp);
      elements.saveTimelineButton.addEventListener("click", openTimelineSaveModal);
      elements.phaseReadEditButton.addEventListener("click", handlePhaseReadEdit);
      elements.addBlockButton.addEventListener("click", () => openBlockModal());

      elements.taskTitleInput.addEventListener("focus", ensureTaskModalEditing);

      elements.taskNotesEditor.addEventListener("pointerdown", handleTaskEditActivator);
      elements.taskForm.addEventListener("submit", handleTaskSubmit);
      elements.taskTitleInput.addEventListener("keydown", handleTaskTitleKeydown);
      elements.taskRichToolbar.addEventListener("click", handleTaskToolbarClick);
      elements.taskFormatToggleButton.addEventListener("click", handleTaskFormatTrayToggle);
      elements.taskFormatBackButton.addEventListener("click", handleTaskFormatBackAction);
      elements.taskFormatForwardButton.addEventListener("click", handleTaskFormatForwardAction);
      elements.taskModalHeader.addEventListener("touchstart", handleTaskSheetTouchStart, { passive: true });
      elements.taskModalHeader.addEventListener("touchmove", handleTaskSheetTouchMove, { passive: false });
      elements.taskModalHeader.addEventListener("touchend", handleTaskSheetTouchEnd);
      elements.taskModalHeader.addEventListener("touchcancel", handleTaskSheetTouchEnd);
      elements.phaseForm.addEventListener("submit", handlePhaseSubmit);
      elements.deletePhaseButton.addEventListener("click", handlePhaseDelete);
      elements.blockForm.addEventListener("submit", handleBlockSubmit);
      elements.deleteBlockButton.addEventListener("click", handleBlockDelete);
      elements.blockSettingsButton.addEventListener("click", handleBlockSettingsToggle);
      elements.deleteTaskButton.addEventListener("click", handleTaskDelete);
      elements.taskModalBottomBar.addEventListener("pointerdown", stopTaskBottomBarInteraction);
      elements.taskModalBottomBar.addEventListener("touchstart", stopTaskBottomBarInteraction, { passive: false });
      elements.taskSettingsButton.addEventListener("click", handleTaskSettingsToggle);

      elements.newTimelineButton.addEventListener("click", handleNewTimeline);

      document.querySelectorAll("[data-close-modal]").forEach((button) => {
        button.addEventListener("click", () => closeModal(button.dataset.closeModal));
      });

      [elements.phaseModalBackdrop, elements.phaseReadModalBackdrop, elements.blockModalBackdrop, elements.taskModalBackdrop, elements.timelineSaveModalBackdrop].forEach((backdrop) => {
        backdrop.addEventListener("click", (event) => {
          if (event.target === backdrop) {
            const type = getModalTypeFromBackdrop(backdrop.id);
            if (type) {
              closeModal(type);
            }
          }
        });
      });

      window.addEventListener("pagehide", () => {
        if (firestoreDb) {
          void saveToCloud();
        }
      });

      document.addEventListener("pointerdown", handleDocumentPointerDown, true);

    function render() {
      document.body.classList.toggle("compact-mode", state.ui.isCompactTimeline);
      elements.toggleCompactButton.classList.toggle("active", state.ui.isCompactTimeline);
      elements.toggleCompactButton.textContent = state.ui.isCompactTimeline ? "Expanded" : "Compact";
      elements.tabTasks.classList.toggle("active", state.ui.activeTab === "tasks");
      elements.tabPhases.classList.toggle("active", state.ui.activeTab === "phases");
      elements.tabTimeline.classList.toggle("active", state.ui.activeTab === "timeline");
      elements.tasksCard.classList.toggle("panel-hidden", state.ui.activeTab !== "tasks");
      elements.phasesCard.classList.toggle("panel-hidden", state.ui.activeTab !== "phases");
      elements.timelineCard.classList.toggle("panel-hidden", state.ui.activeTab !== "timeline");
      elements.addBlockButton.style.display = state.ui.activeTab === "timeline" ? "block" : "none";
      renderTasks();
      renderPhaseRail();
      renderBlockPhaseOptions();
      renderTaskBlockOptions();
      renderLinkedTasks();
      renderTaskSubtasks();
      renderTimeline();
      renderSummary();
      renderSyncStatus();
    }

    function renderPhaseRail() {
      elements.phaseRail.innerHTML = "";
      let revealTarget = null;

      state.phases.forEach((phase, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `phase-chip ${phase.isActive ? "active" : ""}`;
        button.style.setProperty("--phase-color", phase.color);
        button.innerHTML = `
          <div class="phase-topline">
            <span class="phase-dot" aria-hidden="true"></span>
            <span class="phase-badge">${phase.isActive ? "Active" : "Phase"}</span>
          </div>
          <div class="phase-name">${escapeHtml(phase.name)}</div>
          <div class="phase-description">${escapeHtml(phase.details?.trim() || "No details added yet.")}</div>
          <div class="phase-meta">
            <span>${countBlocksForPhase(phase.id)} blocks</span>
            <div class="header-actions">
              <button class="phase-toggle ${phase.isActive ? "active" : ""}" type="button">${phase.isActive ? "Active" : "Inactive"}</button>
              <span class="phase-edit">Edit</span>
            </div>
          </div>
        `;

        button.addEventListener("click", () => openPhaseReadModal(phase.id));

        const editTrigger = button.querySelector(".phase-edit");
        editTrigger.addEventListener("click", (event) => {
          event.stopPropagation();
          openPhaseModal(phase.id);
        });

        const toggleTrigger = button.querySelector(".phase-toggle");
        toggleTrigger.addEventListener("click", (event) => {
          event.stopPropagation();
          setActivePhase(phase.id);
        });

        elements.phaseRail.appendChild(button);

        if (index < state.phases.length - 1) {
          const connector = document.createElement("div");
          connector.className = "phase-connector";
          connector.setAttribute("aria-hidden", "true");
          elements.phaseRail.appendChild(connector);
        }

        if (state.ui.phaseToReveal && state.ui.phaseToReveal === phase.id) {
          revealTarget = button;
        }
      });

      if (revealTarget) {
        revealTarget.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
        state.ui.phaseToReveal = null;
      }
    }

    function renderBlockPhaseOptions() {
      elements.blockPhase.innerHTML = state.phases.map((phase) =>
        `<option value="${phase.id}">${escapeHtml(phase.name)}</option>`
      ).join("");
    }

    function renderTaskBlockOptions() {
      elements.taskBlockSelect.innerHTML = [
        `<option value="">No linked block</option>`,
        ...state.blocks
          .sort((a, b) => timeToMinutes(a.startTime) - timeToMinutes(b.startTime))
          .map((block) => `<option value="${block.id}">${escapeHtml(block.title)} · ${escapeHtml(formatBlockTimeRange(block.startTime, block.endTime, timeToMinutes(block.endTime) <= timeToMinutes(block.startTime)))}</option>`)
      ].join("");
    }

    function renderTasks() {
      const rootTasks = getChildTasks(null);
      if (!rootTasks.length) {
        elements.tasksList.innerHTML = `<div class="tasks-empty">No tasks yet. Add one here, or add tasks inside a block.</div>`;
        return;
      }

      elements.tasksList.innerHTML = rootTasks.map((task) => renderTaskItem(task)).join("");
    }

    function renderTaskItem(task, depth = 0) {
      const block = task.blockId ? getBlockById(task.blockId) : null;
      const overnight = block ? timeToMinutes(block.endTime) <= timeToMinutes(block.startTime) : false;
      const subtasks = getChildTasks(task.id);
      const isExpanded = subtasks.length ? !task.isCollapsed : false;
      const subtaskCountLabel = subtasks.length ? `${subtasks.length} subtask${subtasks.length === 1 ? "" : "s"}` : "";
      const showScheduleMeta = depth === 0;

      return `
        <div class="task-item ${task.isDone ? "done" : ""}" data-task-id="${task.id}" data-parent-task-id="${task.parentTaskId || ""}" data-open-task="${task.id}" style="--task-depth:${depth};">
          ${subtasks.length ? `
            <button class="task-expand ${isExpanded ? "expanded" : ""}" type="button" data-toggle-task-collapse="${task.id}" aria-label="${isExpanded ? "Collapse subtasks" : "Expand subtasks"}">
              <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="m6 3.5 4 4-4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          ` : `<span class="task-expand-placeholder" aria-hidden="true"></span>`}
          <button class="task-toggle ${task.isDone ? "done" : ""}" type="button" data-toggle-task="${task.id}" aria-label="${task.isDone ? "Mark task incomplete" : "Mark task complete"}">
            <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="m3.5 8.3 2.6 2.6 6.4-6.4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <button class="task-main-button" type="button" data-edit-task="${task.id}" data-drag-task-handle="${task.id}">
            <div class="task-title">${escapeHtml(task.title)}</div>
            <div class="task-meta">
              ${showScheduleMeta ? (block ? `<span>${escapeHtml(formatBlockTimeRange(block.startTime, block.endTime, overnight))}</span>` : `<span>Standalone</span>`) : ""}
              ${showScheduleMeta && block ? `<span class="task-block-chip">${escapeHtml(block.title)}</span>` : ""}
              ${subtaskCountLabel ? `<span class="task-subtask-badge">${escapeHtml(subtaskCountLabel)}</span>` : ""}
            </div>
          </button>
          <button class="danger-button task-delete" type="button" data-delete-task="${task.id}" aria-label="Delete task">
            <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M3.8 5.1h8.4M6.2 5.1V3.8h3.6v1.3M5.2 5.1v6.3M8 5.1v6.3M10.8 5.1v6.3M4.6 5.1l.4 7.1h6l.4-7.1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
        ${isExpanded ? subtasks.map((childTask) => renderTaskItem(childTask, depth + 1)).join("") : ""}
      `;
    }

    function renderLinkedTasks() {
      elements.linkedTasksPanel.style.display = state.ui.blockModalMode === "edit" ? "flex" : "none";
      if (state.ui.blockModalMode !== "edit") {
        return;
      }

      const linkedTasks = getTasksForBlock(state.ui.editingBlockId, { topLevelOnly: true });
      if (!linkedTasks.length) {
        elements.linkedTasksList.innerHTML = `<div class="linked-tasks-empty">No tasks linked yet.</div>`;
        return;
      }

      elements.linkedTasksList.innerHTML = linkedTasks.map((task) => `
        <div class="linked-task-item ${task.isDone ? "done" : ""}" data-linked-task-id="${task.id}" data-open-linked-task="${task.id}">
          <button class="ghost-button linked-task-toggle ${task.isDone ? "done" : ""}" type="button" data-toggle-linked-task="${task.id}" aria-label="${task.isDone ? "Mark task incomplete" : "Mark task complete"}">
            <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="m3.5 8.3 2.6 2.6 6.4-6.4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <div class="linked-task-text" data-drag-linked-task-handle="${task.id}">${escapeHtml(task.title)}</div>
        </div>
      `).join("");
    }

    function renderTaskSubtasks() {
      elements.taskSubtasksPanel.style.display = state.ui.taskModalMode === "edit" ? "flex" : "none";
      if (state.ui.taskModalMode !== "edit") {
        closeInlineSubtaskComposer();
        return;
      }

      const subtasks = getChildTasks(state.ui.editingTaskId);
      if (!subtasks.length) {
        elements.taskSubtasksList.innerHTML = `<div class="linked-tasks-empty">No subtasks yet.</div>`;
        return;
      }

      elements.taskSubtasksList.innerHTML = subtasks.map((task) => `
        <div class="linked-task-item ${task.isDone ? "done" : ""}" data-task-subtask-id="${task.id}" data-open-task-subtask="${task.id}">
          <button class="ghost-button linked-task-toggle ${task.isDone ? "done" : ""}" type="button" data-toggle-task-subtask="${task.id}" aria-label="${task.isDone ? "Mark subtask incomplete" : "Mark subtask complete"}">
            <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="m3.5 8.3 2.6 2.6 6.4-6.4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <div class="linked-task-text">${escapeHtml(task.title)}</div>
        </div>
      `).join("");
    }

    function renderSummary() {
      const activePhases = getActivePhases();
      if (!activePhases.length) {
        elements.activePhaseLabel.textContent = "No active phases";
      } else if (activePhases.length === 1) {
        elements.activePhaseLabel.textContent = `${activePhases[0].name} active`;
      } else {
        elements.activePhaseLabel.textContent = `${activePhases.length} phases active`;
      }
    }

    function renderSyncStatus() {
      elements.syncStatusLabel.textContent = state.ui.syncStatus;
      elements.syncStatusLabel.classList.toggle("synced", false);
      elements.syncStatusLabel.classList.toggle("error", state.ui.syncStatus === "Cloud error");
    }

    function setActiveTab(tab) {
      state.ui.activeTab = tab;
      persistState();
      render();
    }

    window.addEventListener("beforeinstallprompt", (event) => {
      event.preventDefault();
      deferredInstallPrompt = event;
      elements.installAppButton.classList.add("visible");
    });

    window.addEventListener("appinstalled", () => {
      deferredInstallPrompt = null;
      elements.installAppButton.classList.remove("visible");
    });

    async function handleInstallApp() {
      if (!deferredInstallPrompt) {
        return;
      }

      deferredInstallPrompt.prompt();
      await deferredInstallPrompt.userChoice;
      deferredInstallPrompt = null;
      elements.installAppButton.classList.remove("visible");
    }

    function renderTimeline() {
      const pixelsPerHour = getPixelsPerHour();
      const timelineHeight = HOURS_IN_DAY * pixelsPerHour;
      elements.timeline.innerHTML = `<div class="timeline-track" aria-hidden="true"></div>`;
      elements.timeline.style.minHeight = `${timelineHeight + 42}px`;

      for (let hour = 0; hour < HOURS_IN_DAY; hour += 1) {
        const hourLine = document.createElement("div");
        hourLine.className = "hour-line";
        hourLine.style.top = `${timelineOffsetForMinute(hour * 60)}px`;
        hourLine.innerHTML = formatHour(hour);
        elements.timeline.appendChild(hourLine);
      }

      const sortedBlocks = [...state.blocks].sort((a, b) => timeToMinutes(a.startTime) - timeToMinutes(b.startTime));
      const blockSegments = sortedBlocks
        .flatMap(createBlockSegments)
        .sort((a, b) => a.startMinutes - b.startMinutes);

      if (!blockSegments.length) {
        const emptyState = document.createElement("div");
        emptyState.className = "empty-state";
        emptyState.textContent = "No blocks yet. Use the + button to add your first activity.";
        elements.timeline.appendChild(emptyState);
      } else {
        renderTimelineGaps(blockSegments, pixelsPerHour);
      }

      blockSegments.forEach((segment) => {
        const { block, startMinutes, endMinutes, isOvernightSegment } = segment;
        const phase = getPhaseById(block.phaseId);
        if (!phase) {
          return;
        }

        const top = timelineOffsetForMinute(startMinutes);
        const height = Math.max(((endMinutes - startMinutes) / 60) * pixelsPerHour, getMinBlockHeight());

        const blockElement = document.createElement("button");
        blockElement.type = "button";
        blockElement.className = "timeline-block";
        blockElement.dataset.blockId = block.id;
        blockElement.style.top = `${top}px`;
        blockElement.style.height = `${height}px`;
        blockElement.style.setProperty("--phase-color", phase.color);
        blockElement.innerHTML = `
          <div class="block-strip" aria-hidden="true"></div>
          <div class="block-content">
            <div class="block-main">
              <div class="block-time">${formatBlockTimeRange(block.startTime, block.endTime, isOvernightSegment)}</div>
              <div class="block-title">${escapeHtml(block.title)}</div>
            </div>
            <div class="block-phase-label">
              <span class="block-phase-swatch" aria-hidden="true"></span>
              <span class="block-phase">${escapeHtml(phase.name)}</span>
            </div>
          </div>
        `;
        blockElement.addEventListener("pointerdown", handleBlockDragStart);
        elements.timeline.appendChild(blockElement);
      });

      renderNowIndicator();
    }

    function renderTimelineGaps(blockSegments, pixelsPerHour) {
      let cursor = 0;

      blockSegments.forEach((segment) => {
        if (segment.startMinutes > cursor) {
          appendTimelineGap(cursor, segment.startMinutes, pixelsPerHour);
        }

        cursor = Math.max(cursor, segment.endMinutes);
      });

      if (cursor < MINUTES_IN_DAY) {
        appendTimelineGap(cursor, MINUTES_IN_DAY, pixelsPerHour);
      }
    }

    function appendTimelineGap(startMinutes, endMinutes, pixelsPerHour) {
      const durationMinutes = endMinutes - startMinutes;
      if (durationMinutes < 30) {
        return;
      }

      const gapElement = document.createElement("div");
      gapElement.className = "timeline-gap";
      gapElement.style.top = `${timelineOffsetForMinute(startMinutes)}px`;
      gapElement.style.height = `${Math.max((durationMinutes / 60) * pixelsPerHour, 18)}px`;
      gapElement.innerHTML = `<span class="timeline-gap-label">Open</span>`;
      elements.timeline.appendChild(gapElement);
    }

    function renderNowIndicator() {
      const nowMinutes = state.ui.now.getHours() * 60 + state.ui.now.getMinutes();
      const nowLine = document.createElement("div");
      nowLine.className = "now-line";
      nowLine.style.top = `${timelineOffsetForMinute(nowMinutes)}px`;
      nowLine.innerHTML = `<span class="now-pill">Now - ${formatDisplayTime(state.ui.now)}</span>`;
      elements.timeline.appendChild(nowLine);
    }

    function handlePhaseSubmit(event) {
      event.preventDefault();

      const id = elements.phaseId.value || crypto.randomUUID();
      const name = elements.phaseName.value.trim();
      const color = elements.phaseColor.value;
      const details = elements.phaseDetails.value.trim();

      if (!name) {
        return;
      }

      if (state.ui.phaseModalMode === "edit") {
        state.phases = state.phases.map((phase) =>
          phase.id === id ? { ...phase, name, color, details } : phase
        );
        state.ui.phaseToReveal = id;
      } else {
        state.phases.push({ id, name, color, details, isActive: false });
        state.ui.phaseToReveal = id;
      }

      persistState({ immediate: true });
      closeModal("phase");
      render();
    }

    function handleBlockSubmit(event) {
      event.preventDefault();

      if (!state.phases.length) {
        return;
      }

      const id = elements.blockId.value || crypto.randomUUID();
      const title = elements.blockTitle.value.trim();
      const notes = elements.blockNotes.value.trim();
      const startTime = elements.blockStartTime.value;
      const endTime = elements.blockEndTime.value;
      const phaseId = elements.blockPhase.value;

      if (!title || !startTime || !endTime || !phaseId) {
        return;
      }

      if (timeToMinutes(endTime) === timeToMinutes(startTime)) {
        alert("Start time and end time cannot be the same.");
        return;
      }

      const nextBlock = { id, title, notes, phaseId, startTime, endTime };
      applyBlockOverride(nextBlock);

      persistState({ immediate: true });
      closeModal("block");
      render();
    }

    function handleCompactToggle() {
      state.ui.isCompactTimeline = !state.ui.isCompactTimeline;
      persistState();
      render();

    function handlePhaseQuickColorChange() {
      elements.phaseColor.value = elements.phaseColorActionSelect.value;
      updatePhaseColorPreview();
