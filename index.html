    function handlePhaseSettingsToggle() {
      elements.phaseSettingsPanel.classList.toggle("open");
    }

    function handleBlockSettingsToggle() {
      elements.blockSettingsPanel.classList.toggle("open");
    }

    function handleBlockNotesEditorInput() {
      syncBlockNotesEditorToField();
    }

    function syncBlockNotesEditorToField() {
      elements.blockNotes.value = elements.blockNotesEditor.textContent || "";
    }

    function syncBlockNotesFieldToEditor() {
      elements.blockNotesEditor.textContent = elements.blockNotes.value || "";
    }

    function handleTaskNotesEditorInput() {
      elements.taskNotes.value = normalizeTaskEditorHtml(elements.taskNotesEditor.innerHTML);
    }

    function syncTaskNotesFieldToEditor() {
      elements.taskNotesEditor.innerHTML = taskNotesToEditorHtml(elements.taskNotes.value || "");
    }

    function taskNotesToEditorHtml(value) {
      const source = String(value || "").trim();
      if (!source) {
        return "";
      }

      if (/<[a-z][\s\S]*>/i.test(source)) {
        return sanitizeTaskRichHtml(source);
      }

      return source
        .split(/\n{2,}/)
        .map((paragraph) => `<p>${escapeHtml(paragraph).replace(/\n/g, "<br>")}</p>`)
        .join("");
    }

    function normalizeTaskEditorHtml(html) {
      const sanitized = sanitizeTaskRichHtml(html || "");
      if (!sanitized) {
        return "";
      }

      const template = document.createElement("template");
      template.innerHTML = sanitized;
      if (!template.content.children.length && template.content.textContent?.trim()) {
        return `<p>${escapeHtml(template.content.textContent.trim())}</p>`;
      }
      return sanitized;
    }

    function sanitizeTaskRichHtml(html) {
      const template = document.createElement("template");
      template.innerHTML = html || "";
      const allowedTags = new Set(["P", "DIV", "BR", "STRONG", "B", "EM", "I", "UL", "OL", "LI"]);

      const sanitizeNode = (node) => {
        if (node.nodeType === Node.TEXT_NODE) {
          return document.createTextNode(node.textContent || "");
        }

        if (node.nodeType !== Node.ELEMENT_NODE) {
          return null;
        }

        const tagName = node.tagName.toUpperCase();
        const fragment = document.createDocumentFragment();
        Array.from(node.childNodes).forEach((child) => {
          const sanitizedChild = sanitizeNode(child);
          if (sanitizedChild) {
            fragment.appendChild(sanitizedChild);
          }
        });

        if (!allowedTags.has(tagName)) {
          return fragment;
        }

        const element = document.createElement(tagName.toLowerCase());
        if ((tagName === "P" || tagName === "DIV" || tagName === "UL" || tagName === "OL" || tagName === "LI") && node.style?.textAlign) {
          const align = node.style.textAlign.toLowerCase();
          if (align === "left" || align === "center") {
            element.style.textAlign = align;
          }
        }
        element.appendChild(fragment);
        return element;
      };

      const wrapper = document.createElement("div");
      Array.from(template.content.childNodes).forEach((child) => {
        const sanitizedChild = sanitizeNode(child);
        if (sanitizedChild) {
          wrapper.appendChild(sanitizedChild);
        }
      });

      return wrapper.innerHTML
        .replace(/(<br>\s*){3,}/g, "<br><br>")
        .trim();
    }

    function isTaskModalOpen() {
      return elements.taskModalBackdrop.classList.contains("open");
    }

    function setTaskModalSheetState(stateName) {
      if (isTaskModalClosing) {
        return;
      }
      state.ui.taskModalSheetState = stateName;
      elements.taskModalBackdrop.classList.toggle("sheet-half", stateName === "half");
      elements.taskModalBackdrop.classList.toggle("sheet-full", stateName === "full");
      elements.taskModalSheet.style.setProperty("--task-sheet-drag-offset", "0px");
    }

    function setTaskModalEditing(isEditing, options = {}) {
      state.ui.taskModalIsEditing = isEditing;
      elements.taskTitleInput.readOnly = !isEditing;
      elements.taskNotesEditor.contentEditable = String(isEditing);
      elements.taskNotesEditor.classList.toggle("view-mode", !isEditing);
      if (!isEditing) {
        setTaskFormattingTrayOpen(false);
      }
      if (isEditing) {
        setTaskModalSheetState("full");
        if (options.focusTarget === "title") {
          requestAnimationFrame(() => elements.taskTitleInput.focus());
        } else if (options.focusTarget !== "none") {
          requestAnimationFrame(() => focusTaskEditorAtEnd());
        }
      } else if (!options.keepSheetFull) {
        setTaskModalSheetState("half");
      }
    }

    function ensureTaskModalEditing() {
      if (!isTaskModalOpen() || state.ui.taskModalIsEditing) {
        return;
      }
      setTaskModalEditing(true, { focusTarget: "notes" });
    }

    function handleTaskEditActivator(event) {
      if (state.ui.taskModalIsEditing) {
        return;
      }
      event.preventDefault();
      const focusTarget = event.currentTarget === elements.taskTitleInput ? "title" : "notes";
      setTaskModalEditing(true, { focusTarget });
    }

    function focusTaskEditorAtEnd() {
      const selection = window.getSelection();
      if (!selection) {
        return;
      }
      const range = document.createRange();
      range.selectNodeContents(elements.taskNotesEditor);
      range.collapse(false);
      selection.removeAllRanges();
      selection.addRange(range);
      elements.taskNotesEditor.focus();
    }

    function handleTaskTitleKeydown(event) {
      if (event.key === "Enter") {
        event.preventDefault();
        focusTaskEditorAtEnd();
      }
    }

    function handleTaskToolbarClick(event) {
      const button = event.target.closest("[data-command]");
      if (!button) {
        return;
      }

      const command = button.dataset.command;
      ensureTaskModalEditing();
      elements.taskNotesEditor.focus();
      if (command === "createLink") {
        const url = window.prompt("Enter link URL");
        if (!url) {
          return;
        }
        document.execCommand(command, false, url);
      } else if (command === "formatBlock") {
        document.execCommand(command, false, button.dataset.value || "p");
      } else if (command === "insertCheckbox") {
        document.execCommand("insertHTML", false, '<div><input type="checkbox" /> </div>');
      } else if (command === "attachFile") {
        document.execCommand("insertHTML", false, '<p>[Attachment]</p>');
      } else {
        document.execCommand(command, false);
      }
      handleTaskNotesEditorInput();
    }

    function setTaskFormattingTrayOpen(isOpen) {
      state.ui.taskFormattingTrayOpen = isOpen;
      elements.taskBottomActions.classList.toggle("hidden", isOpen);
      elements.taskBottomFormatting.classList.toggle("visible", isOpen);
      elements.taskFormatToggleButton.setAttribute("aria-pressed", String(isOpen));
      if (isOpen) {
        elements.taskRichToolbar.scrollLeft = 0;
      }
    }

    function handleTaskFormatBackAction() {
      if (elements.taskRichToolbar.scrollLeft > 4) {
        elements.taskRichToolbar.scrollBy({ left: -220, behavior: "smooth" });
        return;
      }

      setTaskFormattingTrayOpen(false);
    }

    function handleTaskFormatForwardAction() {
      elements.taskRichToolbar.scrollBy({ left: 220, behavior: "smooth" });
    }

    function handleTaskFormatTrayToggle() {
      ensureTaskModalEditing();
      setTaskFormattingTrayOpen(!state.ui.taskFormattingTrayOpen);
    }

    function handleDocumentPointerDown(event) {
      if (!isTaskModalOpen() || !state.ui.taskModalIsEditing) {
        return;
      }

      if (elements.taskModalSheet.contains(event.target)) {
        return;
      }

      if (event.target.closest(".task-modal-bottom-bar")) {
        return;
      }

      if (event.target === elements.taskModalBackdrop) {
        return;
      }

      if (elements.taskModalBackdrop.contains(event.target) && !elements.taskEditZone.contains(event.target) && !elements.taskRichToolbar.contains(event.target)) {
        commitTaskModalChanges();
        setTaskModalEditing(false);
      }
    }

    function stopTaskBottomBarInteraction(event) {
      event.stopPropagation();
    }

    function buildTaskFromModalDraft() {
      const title = elements.taskTitleInput.value.trim();
      const notes = normalizeTaskEditorHtml(elements.taskNotesEditor.innerHTML);
      const blockId = elements.taskBlockSelect.value || null;
      const parentTaskId = elements.taskParentId.value || null;
      return {
        id: elements.taskId.value || crypto.randomUUID(),
        title,
        notes,
        blockId,
        parentTaskId
      };
    }

    function commitTaskModalChanges() {
      const draft = buildTaskFromModalDraft();
      elements.taskNotes.value = draft.notes;
      if (!draft.title && !draft.notes) {
        return;
      }

      const existingTask = state.ui.taskModalMode === "edit" ? getTaskById(draft.id) : null;
      const nextTask = {
        id: draft.id,
        title: draft.title || "Untitled task",
        notes: draft.notes,
        blockId: draft.blockId,
        parentTaskId: draft.parentTaskId,
        isDone: existingTask ? Boolean(existingTask.isDone) : false,
        isCollapsed: existingTask ? Boolean(existingTask.isCollapsed) : false
      };

      if (state.ui.taskModalMode === "edit") {
        state.tasks = state.tasks.map((task) => task.id === draft.id ? nextTask : task);
      } else {
        insertTaskAfterParent(nextTask);
        state.ui.taskModalMode = "edit";
        state.ui.editingTaskId = nextTask.id;
        elements.taskId.value = nextTask.id;
        elements.deleteTaskButton.style.display = "inline-flex";
      }

      persistState({ immediate: true });
      render();
    }

    function handleTaskSheetTouchStart(event) {
      if (!isTaskModalOpen() || !event.touches.length) {
        return;
      }

      activeTaskSheetDrag = {
        startY: event.touches[0].clientY,
        deltaY: 0
      };
      elements.taskModalBackdrop.classList.add("dragging");
    }

    function handleTaskSheetTouchMove(event) {
      if (!activeTaskSheetDrag || !event.touches.length) {
        return;
      }

      const deltaY = event.touches[0].clientY - activeTaskSheetDrag.startY;
      activeTaskSheetDrag.deltaY = deltaY;
      elements.taskModalSheet.style.setProperty("--task-sheet-drag-offset", `${deltaY}px`);
      event.preventDefault();
    }

    function handleTaskSheetTouchEnd() {
      if (!activeTaskSheetDrag) {
        return;
      }

      const deltaY = activeTaskSheetDrag.deltaY;
      elements.taskModalBackdrop.classList.remove("dragging");
      elements.taskModalSheet.style.setProperty("--task-sheet-drag-offset", "0px");
      if (deltaY <= -70) {
        setTaskModalSheetState("full");
      } else if (deltaY >= 70) {
        commitTaskModalChanges();
        setTaskModalEditing(false);
      } else {
        setTaskModalSheetState(state.ui.taskModalSheetState);
      }
      activeTaskSheetDrag = null;
    }

    function handleTaskDragStart(event) {
      const handle = event.target.closest("[data-drag-task-handle]");
      if (!handle) {
        return;
      }

      const item = handle.closest(".task-item");
      if (!item) {
        return;
      }

      activeTaskDrag = {
        taskId: handle.dataset.dragTaskHandle,
        pointerId: event.pointerId,
        startY: event.clientY,
        deltaY: 0,
        moved: false,
        item,
        hoverTaskId: null
      };

      item.setPointerCapture(event.pointerId);
    }

    function handleTaskDragMove(event) {
      if (!activeTaskDrag || activeTaskDrag.pointerId !== event.pointerId) {
        return;
      }

      activeTaskDrag.deltaY = event.clientY - activeTaskDrag.startY;
      if (!activeTaskDrag.moved && Math.abs(activeTaskDrag.deltaY) < 8) {
        return;
      }

      activeTaskDrag.moved = true;
      activeTaskDrag.item.classList.add("dragging");
      activeTaskDrag.item.style.transform = `translateY(${activeTaskDrag.deltaY}px)`;
      const hoverTaskId = getTaskHoverTargetId(event.clientX, event.clientY, activeTaskDrag);
      activeTaskDrag.hoverTaskId = hoverTaskId;
      updateTaskDragPreview(hoverTaskId);
      event.preventDefault();
    }

    function handleTaskDragEnd(event) {
      if (!activeTaskDrag || activeTaskDrag.pointerId !== event.pointerId) {
        return;
      }

      const { taskId, item, moved, hoverTaskId } = activeTaskDrag;
      item.style.transform = "";
      item.classList.remove("dragging");
      clearTaskDragPreview();
      item.releasePointerCapture(event.pointerId);

      if (moved) {
        suppressClickUntil = Date.now() + 300;
        const targetIndex = hoverTaskId
          ? getTaskTargetIndex(taskId, hoverTaskId)
          : getTaskDropIndex(event.clientY, taskId);
        reorderTask(taskId, targetIndex);
      }

      activeTaskDrag = null;
    }

    function getTaskHoverTargetId(clientX, clientY, dragState) {
      if (dragState?.hoverTaskId) {
        const lockedItem = elements.tasksList.querySelector(`.task-item[data-task-id="${dragState.hoverTaskId}"]`);
        if (lockedItem) {
          const rect = lockedItem.getBoundingClientRect();
          if (clientY >= rect.top && clientY <= rect.bottom) {
            return dragState.hoverTaskId;
          }
        }
      }

      const hoveredItem = document.elementFromPoint(clientX, clientY)?.closest(".task-item");
      if (hoveredItem?.dataset.taskId && hoveredItem.dataset.taskId !== dragState?.taskId) {
        return hoveredItem.dataset.taskId;
      }

      return null;
    }

    function getTaskDropIndex(clientY, sourceTaskId) {
      const items = [...elements.tasksList.querySelectorAll(".task-item")].filter((item) => item.dataset.taskId !== sourceTaskId);
      if (!items.length) {
        return 0;
      }

      for (let index = 0; index < items.length; index += 1) {
        const rect = items[index].getBoundingClientRect();
        if (clientY < rect.top + (rect.height / 2)) {
          return index;
        }
      }

      return items.length;
    }

    function getTaskTargetIndex(taskId, hoverTaskId) {
      const sourceIndex = state.tasks.findIndex((task) => task.id === taskId);
      const hoverIndex = state.tasks.findIndex((task) => task.id === hoverTaskId);
      if (sourceIndex < 0 || hoverIndex < 0) {
        return sourceIndex < 0 ? 0 : sourceIndex;
      }

      return hoverIndex;
    }

    function updateTaskDragPreview(hoverTaskId) {
      clearTaskDragPreview();
      if (!activeTaskDrag?.moved || !hoverTaskId) {
        return;
      }

      const hoverItem = elements.tasksList.querySelector(`.task-item[data-task-id="${hoverTaskId}"]`);
      if (!hoverItem) {
        return;
      }

      const direction = activeTaskDrag.deltaY < 0 ? 1 : -1;
      hoverItem.style.transform = `translateY(${direction * (activeTaskDrag.item.getBoundingClientRect().height + 8)}px)`;
    }

    function clearTaskDragPreview() {
      elements.tasksList.querySelectorAll(".task-item").forEach((item) => {
        if (!item.classList.contains("dragging")) {
          item.style.transform = "";
        }
      });
    }

    function reorderTask(taskId, targetIndex) {
      const nextTasks = [...state.tasks];
      const taskIndex = nextTasks.findIndex((task) => task.id === taskId);
      if (taskIndex < 0) {
        return;
      }

      const [movedTask] = nextTasks.splice(taskIndex, 1);
      const safeIndex = Math.max(0, Math.min(targetIndex, nextTasks.length));
      nextTasks.splice(safeIndex, 0, movedTask);
      if (taskIndex === safeIndex) {
        return;
      }
      state.tasks = nextTasks;
      persistState({ immediate: true });
      render();
    }

    function handleBlockDragStart(event) {
      if (event.button !== 0) {
        return;
      }

      const blockElement = event.currentTarget;
      const blockId = blockElement.dataset.blockId;
      const block = getBlockById(blockId);
      if (!block) {
        return;
      }

      activeBlockDrag = {
        blockId,
        pointerId: event.pointerId,
        startY: event.clientY,
        deltaY: 0,
        moved: false,
        blockElement,
        block,
        hoverBlockId: null
      };

      blockElement.setPointerCapture(event.pointerId);
      blockElement.addEventListener("pointermove", handleBlockDragMove);
      blockElement.addEventListener("pointerup", handleBlockDragEnd);
      blockElement.addEventListener("pointercancel", handleBlockDragEnd);
    }

    function handleBlockDragMove(event) {
      if (!activeBlockDrag || activeBlockDrag.pointerId !== event.pointerId) {
        return;
      }

      activeBlockDrag.deltaY = event.clientY - activeBlockDrag.startY;
      if (!activeBlockDrag.moved && Math.abs(activeBlockDrag.deltaY) < 8) {
        return;
      }

      activeBlockDrag.moved = true;
      activeBlockDrag.blockElement.classList.add("dragging");
      activeBlockDrag.blockElement.style.transform = `translateY(${activeBlockDrag.deltaY}px)`;
      const hoverBlockId = getBlockDropTargetId(event.clientX, event.clientY, activeBlockDrag);
      activeBlockDrag.hoverBlockId = hoverBlockId;
      updateBlockDragPreview(hoverBlockId, activeBlockDrag.deltaY);
      event.preventDefault();
    }

    function handleBlockDragEnd(event) {
      if (!activeBlockDrag || activeBlockDrag.pointerId !== event.pointerId) {
        return;
      }

      const { blockElement, moved, blockId } = activeBlockDrag;
      blockElement.style.transform = "";
      blockElement.classList.remove("dragging");
      clearBlockDragPreview();
      blockElement.releasePointerCapture(event.pointerId);
      blockElement.removeEventListener("pointermove", handleBlockDragMove);
      blockElement.removeEventListener("pointerup", handleBlockDragEnd);
      blockElement.removeEventListener("pointercancel", handleBlockDragEnd);

      if (!moved) {
        activeBlockDrag = null;
        openBlockModal(blockId);
        return;
      }

      suppressClickUntil = Date.now() + 300;
      const targetBlockId = activeBlockDrag.hoverBlockId;
      if (targetBlockId && targetBlockId !== blockId) {
        swapBlockSchedule(blockId, targetBlockId);
      } else {
        const minuteDelta = getCappedStandaloneBlockDelta(activeBlockDrag.deltaY);
        if (minuteDelta !== 0) {
          moveBlockByMinutes(blockId, minuteDelta);
        } else {
          render();
        }
      }

      activeBlockDrag = null;
    }

    function getBlockDropTargetId(clientX, clientY, dragState) {
      if (dragState?.hoverBlockId) {
        const lockedElement = elements.timeline.querySelector(`.timeline-block[data-block-id="${dragState.hoverBlockId}"]`);
        if (lockedElement) {
          const rect = lockedElement.getBoundingClientRect();
          if (clientY >= rect.top && clientY <= rect.bottom) {
            return dragState.hoverBlockId;
          }
        }
      }

      const sourceBlockId = dragState?.blockId;
      const targetElement = document.elementFromPoint(clientX, clientY)?.closest(".timeline-block");
      if (targetElement?.dataset.blockId && targetElement.dataset.blockId !== sourceBlockId) {
        return targetElement.dataset.blockId;
      }

      const blocks = [...elements.timeline.querySelectorAll(".timeline-block")].filter((element) => element.dataset.blockId !== sourceBlockId);
      if (!blocks.length) {
        return null;
      }

      const nearestBlock = blocks.reduce((closest, element) => {
        const rect = element.getBoundingClientRect();
        const centerY = rect.top + (rect.height / 2);
        const distance = Math.abs(clientY - centerY);
        if (!closest || distance < closest.distance) {
          return { id: element.dataset.blockId, distance };
        }
        return closest;
      }, null);

      return nearestBlock?.id || null;
    }

    function updateBlockDragPreview(hoverBlockId, deltaY) {
      clearBlockDragPreview();
      if (!activeBlockDrag?.moved) {
        return;
      }

      const sourceTimeElement = activeBlockDrag.blockElement.querySelector(".block-time");
      const draggedBlock = getBlockById(activeBlockDrag.blockId);
      if (!draggedBlock || !sourceTimeElement) {
        return;
      }

      if (hoverBlockId) {
        const targetElement = elements.timeline.querySelector(`.timeline-block[data-block-id="${hoverBlockId}"]`);
        const targetTimeElement = targetElement?.querySelector(".block-time");
        const hoveredBlock = getBlockById(hoverBlockId);
        if (!targetElement || !hoveredBlock || !targetTimeElement) {
          return;
        }

        targetElement.style.transform = `translateY(${activeBlockDrag.blockElement.getBoundingClientRect().height + 8}px)`;
        const draggedDuration = getBlockDurationMinutes(draggedBlock);
        const hoveredDuration = getBlockDurationMinutes(hoveredBlock);
        const hoveredStartMinutes = timeToMinutes(hoveredBlock.startTime);
        sourceTimeElement.textContent = formatBlockTimeRange(
          minutesToTime(hoveredStartMinutes),
          minutesToTime(hoveredStartMinutes + draggedDuration),
          hoveredStartMinutes + draggedDuration >= MINUTES_IN_DAY
        );
        targetTimeElement.textContent = formatBlockTimeRange(
          minutesToTime(hoveredStartMinutes + draggedDuration),
          minutesToTime(hoveredStartMinutes + draggedDuration + hoveredDuration),
          hoveredStartMinutes + draggedDuration + hoveredDuration >= MINUTES_IN_DAY
        );
        return;
      }

      const minuteDelta = getCappedStandaloneBlockDelta(deltaY);
      if (minuteDelta === 0) {
        return;
      }

      const startMinutes = timeToMinutes(draggedBlock.startTime);
      const duration = getBlockDurationMinutes(draggedBlock);
      const nextStartMinutes = clampMinutes(startMinutes + minuteDelta);
      sourceTimeElement.textContent = formatBlockTimeRange(
        minutesToTime(nextStartMinutes),
        minutesToTime(nextStartMinutes + duration),
        nextStartMinutes + duration >= MINUTES_IN_DAY
      );
    }

    function clearBlockDragPreview() {
      elements.timeline.querySelectorAll(".timeline-block").forEach((element) => {
        if (!element.classList.contains("dragging")) {
          element.style.transform = "";
        }
        const blockId = element.dataset.blockId;
        const block = blockId ? getBlockById(blockId) : null;
        const timeElement = element.querySelector(".block-time");
        if (block && timeElement) {
          const isOvernight = timeToMinutes(block.endTime) <= timeToMinutes(block.startTime);
          timeElement.textContent = formatBlockTimeRange(block.startTime, block.endTime, isOvernight);
        }
      });
    }

    function swapBlockSchedule(sourceBlockId, targetBlockId) {
      const sourceBlock = getBlockById(sourceBlockId);
      const targetBlock = getBlockById(targetBlockId);
      if (!sourceBlock || !targetBlock) {
        render();
        return;
      }

      const sourceDuration = getBlockDurationMinutes(sourceBlock);
      const targetDuration = getBlockDurationMinutes(targetBlock);
      const targetStartMinutes = timeToMinutes(targetBlock.startTime);
      const updatedSourceBlock = {
        ...sourceBlock,
        startTime: minutesToTime(targetStartMinutes),
        endTime: minutesToTime(targetStartMinutes + sourceDuration)
      };
      const updatedTargetBlock = {
        ...targetBlock,
        startTime: minutesToTime(targetStartMinutes + sourceDuration),
        endTime: minutesToTime(targetStartMinutes + sourceDuration + targetDuration)
      };

      const preservedBlocks = state.blocks.filter((block) => block.id !== sourceBlockId && block.id !== targetBlockId);
      state.blocks = preservedBlocks;
      applyBlockOverride(updatedSourceBlock);
      applyBlockOverride(updatedTargetBlock);

      persistState({ immediate: true });
      render();
    }

    function getBlockDurationMinutes(block) {
      const startMinutes = timeToMinutes(block.startTime);
      const endMinutes = timeToMinutes(block.endTime);
      return endMinutes > startMinutes
        ? endMinutes - startMinutes
        : (MINUTES_IN_DAY - startMinutes) + endMinutes;
    }

    function getCappedStandaloneBlockDelta(deltaY) {
      const rawMinutes = (deltaY / getPixelsPerHour()) * 60;
      const cappedMinutes = Math.max(-30, Math.min(30, rawMinutes));
      return Math.round(cappedMinutes / 15) * 15;
    }

    function moveBlockByMinutes(blockId, minuteDelta) {
      const block = getBlockById(blockId);
      if (!block) {
        render();
        return;
      }

      const startMinutes = timeToMinutes(block.startTime);
      const duration = getBlockDurationMinutes(block);
      const nextStartMinutes = clampMinutes(startMinutes + minuteDelta);
      const nextEndMinutes = (nextStartMinutes + duration) % MINUTES_IN_DAY;
      const candidateBlock = {
        ...block,
        startTime: minutesToTime(nextStartMinutes),
        endTime: minutesToTime(nextEndMinutes)
      };

      applyBlockOverride(candidateBlock);
      persistState({ immediate: true });
      render();
    }

    function clampMinutes(minutes) {
      if (minutes < 0) {
        return 0;
      }
      if (minutes >= MINUTES_IN_DAY) {
        return MINUTES_IN_DAY - 1;
      }
      return minutes;
    }

    function handleTaskListClick(event) {
      if (Date.now() < suppressClickUntil) {
        return;
      }

      const collapseButton = event.target.closest("[data-toggle-task-collapse]");
      if (collapseButton) {
        toggleTaskCollapse(collapseButton.dataset.toggleTaskCollapse);
        return;
      }

      const toggleButton = event.target.closest("[data-toggle-task]");
      if (toggleButton) {
        toggleTask(toggleButton.dataset.toggleTask);
        return;
      }

      const editButton = event.target.closest("[data-edit-task]");
      if (editButton) {
        openTaskModal(editButton.dataset.editTask);
        return;
      }

      const deleteButton = event.target.closest("[data-delete-task]");
      if (deleteButton) {
        deleteTask(deleteButton.dataset.deleteTask);
        return;
      }

      const taskItem = event.target.closest("[data-open-task]");
      if (taskItem) {
        openTaskModal(taskItem.dataset.openTask);
      }
    }

    function handleLinkedTaskListClick(event) {
      if (Date.now() < suppressClickUntil) {
        return;
      }

      const toggleButton = event.target.closest("[data-toggle-linked-task]");
      if (toggleButton) {
        toggleTask(toggleButton.dataset.toggleLinkedTask);
        return;
      }

      const linkedTaskItem = event.target.closest("[data-open-linked-task]");
      if (linkedTaskItem) {
        openTaskModal(linkedTaskItem.dataset.openLinkedTask);
      }
    }

    function handleTaskSubtasksListClick(event) {
      const toggleButton = event.target.closest("[data-toggle-task-subtask]");
      if (toggleButton) {
        toggleTask(toggleButton.dataset.toggleTaskSubtask);
        return;
      }

      const subtaskItem = event.target.closest("[data-open-task-subtask]");
      if (subtaskItem) {
        openTaskModal(subtaskItem.dataset.openTaskSubtask);
      }
    }

    function handleLinkedTaskDragStart(event) {
      const handle = event.target.closest("[data-drag-linked-task-handle]");
      if (!handle) {
        return;
      }

      const item = handle.closest(".linked-task-item");
      if (!item) {
        return;
      }

      activeLinkedTaskDrag = {
        taskId: handle.dataset.dragLinkedTaskHandle,
        pointerId: event.pointerId,
        startY: event.clientY,
        deltaY: 0,
        moved: false,
        item,
        hoverTaskId: null
      };

      item.setPointerCapture(event.pointerId);
    }

    function handleLinkedTaskDragMove(event) {
      if (!activeLinkedTaskDrag || activeLinkedTaskDrag.pointerId !== event.pointerId) {
        return;
      }

      activeLinkedTaskDrag.deltaY = event.clientY - activeLinkedTaskDrag.startY;
      if (!activeLinkedTaskDrag.moved && Math.abs(activeLinkedTaskDrag.deltaY) < 8) {
        return;
      }

      activeLinkedTaskDrag.moved = true;
      activeLinkedTaskDrag.item.classList.add("dragging");
      activeLinkedTaskDrag.item.style.transform = `translateY(${activeLinkedTaskDrag.deltaY}px)`;
      const hoverTaskId = getLinkedTaskHoverTargetId(event.clientX, event.clientY, activeLinkedTaskDrag);
      activeLinkedTaskDrag.hoverTaskId = hoverTaskId;
      updateLinkedTaskDragPreview(hoverTaskId);
      event.preventDefault();
    }

    function handleLinkedTaskDragEnd(event) {
      if (!activeLinkedTaskDrag || activeLinkedTaskDrag.pointerId !== event.pointerId) {
        return;
      }

      const { taskId, item, moved, hoverTaskId } = activeLinkedTaskDrag;
      item.style.transform = "";
      item.classList.remove("dragging");
      clearLinkedTaskDragPreview();
      item.releasePointerCapture(event.pointerId);

      if (moved) {
        suppressClickUntil = Date.now() + 300;
        const targetIndex = hoverTaskId
          ? getLinkedTaskTargetIndex(taskId, hoverTaskId)
          : getLinkedTaskDropIndex(event.clientY, taskId);
        reorderLinkedTask(taskId, targetIndex);
      }

      activeLinkedTaskDrag = null;
    }

    function getLinkedTaskHoverTargetId(clientX, clientY, dragState) {
      if (dragState?.hoverTaskId) {
        const lockedItem = elements.linkedTasksList.querySelector(`.linked-task-item[data-linked-task-id="${dragState.hoverTaskId}"]`);
        if (lockedItem) {
          const rect = lockedItem.getBoundingClientRect();
          if (clientY >= rect.top && clientY <= rect.bottom) {
            return dragState.hoverTaskId;
          }
        }
      }

      const hoveredItem = document.elementFromPoint(clientX, clientY)?.closest(".linked-task-item");
      if (hoveredItem?.dataset.linkedTaskId && hoveredItem.dataset.linkedTaskId !== dragState?.taskId) {
        return hoveredItem.dataset.linkedTaskId;
      }

      return null;
    }

    function getLinkedTaskDropIndex(clientY, sourceTaskId) {
      const items = [...elements.linkedTasksList.querySelectorAll(".linked-task-item")].filter((item) => item.dataset.linkedTaskId !== sourceTaskId);
      if (!items.length) {
        return 0;
      }

      for (let index = 0; index < items.length; index += 1) {
        const rect = items[index].getBoundingClientRect();
        if (clientY < rect.top + (rect.height / 2)) {
          return index;
        }
      }

      return items.length;
    }

    function getLinkedTaskTargetIndex(taskId, hoverTaskId) {
      const linkedTasks = getTasksForBlock(state.ui.editingBlockId, { topLevelOnly: true });
      const sourceIndex = linkedTasks.findIndex((task) => task.id === taskId);
      const hoverIndex = linkedTasks.findIndex((task) => task.id === hoverTaskId);
      if (sourceIndex < 0 || hoverIndex < 0) {
        return sourceIndex < 0 ? 0 : sourceIndex;
      }

      return hoverIndex;
    }

    function updateLinkedTaskDragPreview(hoverTaskId) {
      clearLinkedTaskDragPreview();
      if (!activeLinkedTaskDrag?.moved || !hoverTaskId) {
        return;
      }

      const hoverItem = elements.linkedTasksList.querySelector(`.linked-task-item[data-linked-task-id="${hoverTaskId}"]`);
      if (!hoverItem) {
        return;
      }

      const direction = activeLinkedTaskDrag.deltaY < 0 ? 1 : -1;
      hoverItem.style.transform = `translateY(${direction * (activeLinkedTaskDrag.item.getBoundingClientRect().height + 8)}px)`;
    }

    function clearLinkedTaskDragPreview() {
      elements.linkedTasksList.querySelectorAll(".linked-task-item").forEach((item) => {
        if (!item.classList.contains("dragging")) {
          item.style.transform = "";
        }
      });
    }

    function reorderLinkedTask(taskId, targetIndex) {
      const linkedTasks = getTasksForBlock(state.ui.editingBlockId, { topLevelOnly: true });
      const linkedTaskIds = new Set(linkedTasks.map((task) => task.id));
      const otherTasks = state.tasks.filter((task) => !linkedTaskIds.has(task.id));
      const taskIndex = linkedTasks.findIndex((task) => task.id === taskId);
      if (taskIndex < 0) {
        return;
      }

      const [movedTask] = linkedTasks.splice(taskIndex, 1);
      const safeIndex = Math.max(0, Math.min(targetIndex, linkedTasks.length));
      linkedTasks.splice(safeIndex, 0, movedTask);
      state.tasks = [...otherTasks, ...linkedTasks];
      persistState({ immediate: true });
      render();
    }

    function handleAddLinkedTask() {
      if (!state.ui.editingBlockId) {
        return;
      }

      openTaskModal(null, state.ui.editingBlockId);
    }

    function handleAddSubtask() {
      if (!state.ui.editingTaskId) {
        return;
      }
      elements.taskSubtaskInlineForm.classList.add("open");
      elements.taskSubtaskInlineInput.value = "";
      elements.taskSubtaskInlineInput.focus();
    }

    function closeInlineSubtaskComposer() {
      elements.taskSubtaskInlineForm.classList.remove("open");
      elements.taskSubtaskInlineInput.value = "";
    }

    function handleInlineSubtaskKeydown(event) {
      if (event.key === "Enter") {
        event.preventDefault();
        handleInlineSubtaskSave();
        return;
      }

      if (event.key === "Escape") {
        event.preventDefault();
        closeInlineSubtaskComposer();
      }
    }

    function handleInlineSubtaskSave() {
      if (!state.ui.editingTaskId) {
        return;
      }

      const title = elements.taskSubtaskInlineInput.value.trim();
      if (!title) {
        return;
      }

      const parentTask = getTaskById(state.ui.editingTaskId);
      const nextTask = {
        id: crypto.randomUUID(),
        title,
        notes: "",
        blockId: parentTask?.blockId || null,
        parentTaskId: state.ui.editingTaskId,
        isDone: false,
        isCollapsed: false
      };

      state.tasks = state.tasks.map((task) =>
        task.id === state.ui.editingTaskId ? { ...task, isCollapsed: false } : task
      );
      insertTaskAfterParent(nextTask);
      closeInlineSubtaskComposer();
      persistState({ immediate: true });
      render();
    }

    function handleTaskSubmit(event) {
      event.preventDefault();
      commitTaskModalChanges();
      setTaskModalEditing(false);
    }

    function handleTaskDelete() {
      if (state.ui.taskModalMode !== "edit") {
        return;
      }

      deleteTask(state.ui.editingTaskId);
      closeModal("task", { skipCommit: true });
      render();
    }

    function handleTaskSettingsToggle() {
      elements.taskSettingsPanel.classList.toggle("open");
    }

    function toggleTask(taskId) {
      state.tasks = state.tasks.map((task) =>
        task.id === taskId ? { ...task, isDone: !task.isDone } : task
      );
      persistState({ immediate: true });
      render();
    }

    function toggleTaskCollapse(taskId) {
      state.tasks = state.tasks.map((task) =>
        task.id === taskId ? { ...task, isCollapsed: !task.isCollapsed } : task
      );
      persistState();
      render();
    }

    function deleteTask(taskId) {
      const descendantIds = getTaskDescendantIds(taskId);
      const removalIds = new Set([taskId, ...descendantIds]);
      state.tasks = state.tasks.filter((task) => !removalIds.has(task.id));
      persistState({ immediate: true });
      render();
    }

    function handlePhaseDelete() {
      if (state.ui.phaseModalMode !== "edit") {
        return;
      }

      if (state.phases.length === 1) {
        alert("You need at least one phase.");
        return;
      }

      const targetId = state.ui.editingPhaseId;
      const remainingPhases = state.phases.filter((phase) => phase.id !== targetId);
      const removedBlockIds = new Set(state.blocks.filter((block) => block.phaseId === targetId).map((block) => block.id));
      state.phases = remainingPhases;

      state.blocks = state.blocks.filter((block) => block.phaseId !== targetId);
      state.tasks = state.tasks.map((task) =>
        task.blockId && removedBlockIds.has(task.blockId) ? { ...task, blockId: null } : task
      );
      state.ui.phaseToReveal = state.phases[0]?.id ?? null;
      persistState({ immediate: true });
      closeModal("phase");
      render();
    }

    function handleBlockDelete() {
      if (state.ui.blockModalMode !== "edit") {
        return;
      }

      const targetId = state.ui.editingBlockId;
      state.blocks = state.blocks.filter((block) => block.id !== targetId);
      state.tasks = state.tasks.map((task) =>
        task.blockId === targetId ? { ...task, blockId: null } : task
      );
      persistState({ immediate: true });
      closeModal("block");
      render();
    }

    function openTimelineSaveModal() {
      elements.timelineSaveName.value = buildDefaultTimelineName();
      populateTimelineSavePhaseOptions();
      renderSavedTimelineList();
      openModal("timeline-save");
    }

    function handleTimelineSaveSubmit(event) {
      event.preventDefault();

      const name = elements.timelineSaveName.value.trim() || buildDefaultTimelineName();
      const selectedPhaseId = elements.timelineSavePhase.value;
      if (!selectedPhaseId) {
        alert("Select one active phase for this saved timeline.");
        return;
      }

      const snapshot = {
        id: crypto.randomUUID(),
        name,
        savedAt: new Date().toISOString(),
        selectedPhaseId,
        phases: clonePhases(state.phases),
        blocks: cloneBlocks(state.blocks),
        tasks: cloneTasks(state.tasks)
      };

      state.savedTimelines.unshift(snapshot);
      persistState({ immediate: true });
      closeModal("timeline-save");
      render();
    }

    function handleNewTimeline() {
      state.blocks = [];
      state.tasks = [];
      state.ui.activeTab = "timeline";
      persistState({ immediate: true });
      closeModal("timeline-save");
      render();
    }

    function handleSavedTimelineListClick(event) {
      const loadButton = event.target.closest("[data-load-timeline]");
      if (loadButton) {
        loadSavedTimeline(loadButton.dataset.loadTimeline);
        return;
      }

      const deleteButton = event.target.closest("[data-delete-timeline]");
      if (deleteButton) {
        deleteSavedTimeline(deleteButton.dataset.deleteTimeline);
      }
    }

    function loadSavedTimeline(savedTimelineId) {
      const snapshot = state.savedTimelines.find((item) => item.id === savedTimelineId);
      if (!snapshot) {
        return;
      }

      state.phases = clonePhases(snapshot.phases);
      state.blocks = cloneBlocks(snapshot.blocks);
      state.tasks = cloneTasks(snapshot.tasks || []);
      state.ui.activeTab = "timeline";
      state.ui.phaseToReveal = state.phases[0]?.id ?? null;
      persistState({ immediate: true });
      closeModal("timeline-save");
      render();
    }

    function deleteSavedTimeline(savedTimelineId) {
      state.savedTimelines = state.savedTimelines.filter((item) => item.id !== savedTimelineId);
      persistState({ immediate: true });
      renderSavedTimelineList();
    }

    function renderSavedTimelineList() {
      if (!state.savedTimelines.length) {
        elements.savedTimelineList.innerHTML = `<div class="saved-timeline-empty">No saved timelines yet.</div>`;
        return;
      }

      elements.savedTimelineList.innerHTML = state.savedTimelines.map((item) => `
        <div class="saved-timeline-item">
          <div class="saved-timeline-info">
            <div class="saved-timeline-title">${escapeHtml(item.name)}</div>
            ${renderSavedTimelinePhaseChip(item)}
            <div class="saved-timeline-meta">${item.blocks.length} blocks - ${item.phases.length} phases - ${escapeHtml(formatSavedTimelineDate(item.savedAt))}</div>
          </div>
          <div class="saved-timeline-actions">
            <button class="ghost-button micro-button" type="button" data-load-timeline="${item.id}">Load</button>
            <button class="danger-button micro-button" type="button" data-delete-timeline="${item.id}">Delete</button>
          </div>
        </div>
      `).join("");
    }

    function populateTimelineSavePhaseOptions() {
      const activePhases = getActivePhases();
      if (!activePhases.length) {
        elements.timelineSavePhase.innerHTML = `<option value="">No active phases</option>`;
        elements.timelineSavePhase.value = "";
        return;
      }

      elements.timelineSavePhase.innerHTML = activePhases.map((phase) =>
        `<option value="${phase.id}">${escapeHtml(phase.name)}</option>`
      ).join("");
      elements.timelineSavePhase.value = activePhases[0].id;
    }

    function renderSavedTimelinePhaseChip(item) {
      const phase = item.phases.find((entry) => entry.id === item.selectedPhaseId)
        || item.phases.find((entry) => entry.isActive)
        || item.phases[0];
      if (!phase) {
        return "";
      }

      return `
        <div class="saved-timeline-phase" style="--phase-color: ${escapeHtml(phase.color)};">
          <span class="saved-timeline-phase-dot" aria-hidden="true"></span>
          <span>${escapeHtml(phase.name)}</span>
        </div>
      `;
    }

    function setActivePhase(phaseId) {
      state.phases = state.phases.map((phase) =>
        phase.id === phaseId ? { ...phase, isActive: !phase.isActive } : phase
      );
      state.ui.phaseToReveal = phaseId;
      persistState({ immediate: true });
      render();
    }

    function openPhaseModal(phaseId = null) {
      const phase = phaseId ? getPhaseById(phaseId) : null;

      state.ui.phaseModalMode = phase ? "edit" : "create";
      state.ui.editingPhaseId = phase ? phase.id : null;
      elements.phaseId.value = phase ? phase.id : "";
      elements.phaseName.value = phase ? phase.name : "";
      elements.phaseColor.value = phase ? phase.color : COLOR_OPTIONS[0].value;
      elements.phaseColorActionSelect.value = phase ? phase.color : COLOR_OPTIONS[0].value;
      updatePhaseColorPreview();
      elements.phaseDetails.value = phase ? phase.details || "" : "";
      elements.deletePhaseButton.style.display = phase ? "inline-flex" : "none";
      elements.phaseSettingsPanel.classList.remove("open");

      openModal("phase");
    }

    function openPhaseReadModal(phaseId) {
      const phase = getPhaseById(phaseId);
      if (!phase) {
        return;
      }

      state.ui.viewingPhaseId = phaseId;
      elements.phaseReadTitle.textContent = phase.name;
      elements.phaseReadStatus.textContent = phase.isActive ? "Active phase" : "Inactive phase";
      elements.phaseReadBody.textContent = phase.details?.trim() || "No details added yet.";
      elements.phaseReadCard.style.setProperty("--phase-color", phase.color);
      openModal("phase-read");
    }

    function handlePhaseReadEdit() {
      const phaseId = state.ui.viewingPhaseId;
      closeModal("phase-read");
      if (phaseId) {
        openPhaseModal(phaseId);
      }
    }

    function openBlockModal(blockId = null) {
      if (!state.phases.length) {
        alert("Create at least one phase before adding a block.");
        return;
      }

      const block = blockId ? getBlockById(blockId) : null;
      const activePhase = getActivePhases()[0];
      const defaultPhaseId = activePhase ? activePhase.id : state.phases[0].id;

      state.ui.blockModalMode = block ? "edit" : "create";
      state.ui.editingBlockId = block ? block.id : null;
      elements.blockId.value = block ? block.id : "";
      elements.blockTitle.value = block ? block.title : "";
      elements.blockNotes.value = block ? block.notes || "" : "";
      syncBlockNotesFieldToEditor();
      elements.blockStartTime.value = block ? block.startTime : "09:00";
      elements.blockEndTime.value = block ? block.endTime : "10:00";
      elements.blockPhase.value = block ? block.phaseId : defaultPhaseId;
      elements.deleteBlockButton.style.display = block ? "inline-flex" : "none";
      elements.blockSettingsPanel.classList.remove("open");
      renderLinkedTasks();

      openModal("block");
    }

    function openTaskModal(taskId = null, blockId = null, parentTaskId = null) {
      const task = taskId ? getTaskById(taskId) : null;
      const resolvedParentTaskId = task ? (task.parentTaskId || null) : parentTaskId;

      state.ui.taskModalMode = task ? "edit" : "create";
      state.ui.editingTaskId = task ? task.id : null;
      state.ui.taskModalParentId = resolvedParentTaskId;
      elements.taskId.value = task ? task.id : "";
      elements.taskParentId.value = resolvedParentTaskId || "";
      elements.taskTitleInput.value = task ? task.title : "";
      elements.taskNotes.value = task ? task.notes || "" : "";
      syncTaskNotesFieldToEditor();
      renderTaskBlockOptions();
      elements.taskBlockSelect.value = task ? (task.blockId || "") : (blockId || "");
      elements.deleteTaskButton.style.display = task ? "inline-flex" : "none";
      elements.taskSettingsPanel.classList.remove("open");
      setTaskFormattingTrayOpen(false);
      closeInlineSubtaskComposer();
      renderTaskSubtasks();
      setTaskModalSheetState(task ? "half" : "full");
      setTaskModalEditing(!task, { focusTarget: task ? "none" : "title", keepSheetFull: !task });
      openModal("task");
    }

    function openModal(type) {
      const backdrop = type === "phase"
        ? elements.phaseModalBackdrop
        : type === "phase-read"
          ? elements.phaseReadModalBackdrop
          : type === "task"
            ? elements.taskModalBackdrop
          : type === "timeline-save"
            ? elements.timelineSaveModalBackdrop
            : elements.blockModalBackdrop;
      backdrop.classList.add("open");
      backdrop.setAttribute("aria-hidden", "false");
      if (type === "task") {
        window.clearTimeout(taskModalCloseTimer);
        isTaskModalClosing = false;
        elements.taskModalBackdrop.classList.remove("closing");
        requestAnimationFrame(() => {
          elements.taskModalBackdrop.classList.add("active");
        });
      }
    }

    function closeModal(type, options = {}) {
      const backdrop = type === "phase"
        ? elements.phaseModalBackdrop
        : type === "phase-read"
          ? elements.phaseReadModalBackdrop
          : type === "task"
            ? elements.taskModalBackdrop
          : type === "timeline-save"
            ? elements.timelineSaveModalBackdrop
            : elements.blockModalBackdrop;
      if (type === "task") {
        if (isTaskModalClosing) {
          return;
        }
        isTaskModalClosing = true;
        if (!options.skipCommit) {
          commitTaskModalChanges();
        }
        elements.taskModalBackdrop.classList.add("closing");
        elements.taskModalBackdrop.classList.remove("active", "dragging");
        taskModalCloseTimer = window.setTimeout(() => {
          backdrop.classList.remove("open", "sheet-half", "sheet-full", "closing");
          backdrop.setAttribute("aria-hidden", "true");
          isTaskModalClosing = false;
        }, 300);
      } else {
        backdrop.classList.remove("open");
        backdrop.setAttribute("aria-hidden", "true");
      }

      if (type === "phase") {
        elements.phaseForm.reset();
        elements.phaseColor.value = COLOR_OPTIONS[0].value;
        elements.phaseColorActionSelect.value = COLOR_OPTIONS[0].value;
        updatePhaseColorPreview();
        elements.phaseDetails.value = "";
        elements.phaseSettingsPanel.classList.remove("open");
      } else if (type === "phase-read") {
        state.ui.viewingPhaseId = null;
      } else if (type === "task") {
        elements.taskForm.reset();
        elements.taskNotes.value = "";
        syncTaskNotesFieldToEditor();
        elements.taskBlockSelect.value = "";
        elements.taskParentId.value = "";
        elements.taskSettingsPanel.classList.remove("open");
        setTaskFormattingTrayOpen(false);
        closeInlineSubtaskComposer();
        state.ui.editingTaskId = null;
        state.ui.taskModalParentId = null;
        state.ui.taskModalIsEditing = false;
        state.ui.taskModalSheetState = "half";
        state.ui.taskFormattingTrayOpen = false;
      } else if (type === "timeline-save") {
        elements.timelineSaveForm.reset();
      } else {
        elements.blockForm.reset();
        elements.blockNotes.value = "";
        syncBlockNotesFieldToEditor();
        elements.blockSettingsPanel.classList.remove("open");
        state.ui.editingBlockId = null;
      }
    }

    function getModalTypeFromBackdrop(backdropId) {
      if (backdropId === "phase-modal-backdrop") return "phase";
      if (backdropId === "phase-read-modal-backdrop") return "phase-read";
      if (backdropId === "block-modal-backdrop") return "block";
      if (backdropId === "task-modal-backdrop") return "task";
      if (backdropId === "timeline-save-modal-backdrop") return "timeline-save";
      return null;
    }

    function scheduleNowUpdater() {
      setInterval(() => {
        state.ui.now = new Date();
        renderTimeline();
      }, 60000);
    }

    function getActivePhases() {
      return state.phases.filter((phase) => phase.isActive);
    }

    function getPhaseById(phaseId) {
      return state.phases.find((phase) => phase.id === phaseId) || null;
    }

    function getBlockById(blockId) {
      return state.blocks.find((block) => block.id === blockId) || null;
    }

    function getTaskById(taskId) {
      return state.tasks.find((task) => task.id === taskId) || null;
    }

    function getChildTasks(parentTaskId) {
      const normalizedParentId = parentTaskId || null;
      return state.tasks.filter((task) => (task.parentTaskId || null) === normalizedParentId);
    }

    function getTasksForBlock(blockId, options = {}) {
      const topLevelOnly = Boolean(options.topLevelOnly);
      return state.tasks.filter((task) =>
        task.blockId === blockId && (!topLevelOnly || !task.parentTaskId)
      );
    }

    function getTaskDescendantIds(taskId) {
      const descendantIds = [];
      const stack = [taskId];
      while (stack.length) {
        const currentId = stack.pop();
        state.tasks.forEach((task) => {
          if (task.parentTaskId === currentId) {
            descendantIds.push(task.id);
            stack.push(task.id);
          }
        });
      }
      return descendantIds;
    }

    function insertTaskAfterParent(task) {
      if (!task.parentTaskId) {
        state.tasks.unshift(task);
        return;
      }

      const descendantIds = getTaskDescendantIds(task.parentTaskId);
      const insertAfterIds = new Set([task.parentTaskId, ...descendantIds]);
      const parentClusterEndIndex = state.tasks.reduce((lastIndex, currentTask, index) =>
        insertAfterIds.has(currentTask.id) ? index : lastIndex, -1
      );

      if (parentClusterEndIndex < 0) {
        state.tasks.unshift(task);
        return;
      }

      state.tasks = [
        ...state.tasks.slice(0, parentClusterEndIndex + 1),
        task,
        ...state.tasks.slice(parentClusterEndIndex + 1)
      ];
    }

    function countBlocksForPhase(phaseId) {
      return state.blocks.filter((block) => block.phaseId === phaseId).length;
    }

    function clonePhases(phases) {
      return phases.map((phase) => ({
        id: phase.id,
        name: phase.name,
        color: phase.color,
        isActive: Boolean(phase.isActive),
        details: phase.details || ""
      }));
    }

    function cloneBlocks(blocks) {
      return blocks.map((block) => ({
        id: block.id,
        title: block.title,
        notes: block.notes || "",
        phaseId: block.phaseId,
        startTime: block.startTime,
        endTime: block.endTime
      }));
    }

    function cloneTasks(tasks) {
      return tasks.map((task) => ({
        id: task.id,
        title: task.title,
        notes: task.notes || "",
        blockId: task.blockId || null,
        parentTaskId: task.parentTaskId || null,
        isDone: Boolean(task.isDone),
        isCollapsed: Boolean(task.isCollapsed)
      }));
    }

    function normalizeSavedPhases(phases) {
      return Array.isArray(phases)
        ? phases.map((phase, index) => ({
            id: typeof phase?.id === "string" && phase.id ? phase.id : crypto.randomUUID(),
            name: typeof phase?.name === "string" && phase.name.trim() ? phase.name.trim() : `Phase ${index + 1}`,
            color: typeof phase?.color === "string" && phase.color ? phase.color : COLOR_OPTIONS[index % COLOR_OPTIONS.length].value,
            isActive: Boolean(phase?.isActive),
            details: typeof phase?.details === "string" ? phase.details : ""
          }))
        : [];
    }

    function normalizeSavedBlocks(blocks, phases) {
      return Array.isArray(blocks)
        ? blocks
            .filter((block) => typeof block?.phaseId === "string")
            .map((block) => ({
              id: typeof block.id === "string" && block.id ? block.id : crypto.randomUUID(),
              title: typeof block.title === "string" && block.title.trim() ? block.title.trim() : "Untitled block",
              notes: typeof block.notes === "string" ? block.notes : "",
              phaseId: block.phaseId,
              startTime: normalizeTimeValue(block.startTime),
              endTime: normalizeTimeValue(block.endTime)
            }))
            .filter((block) => phases.some((phase) => phase.id === block.phaseId))
        : [];
    }

    function normalizeSavedTasks(tasks, blocks) {
      if (!Array.isArray(tasks)) {
        return [];
      }

      const normalizedTasks = tasks.map((task) => ({
        id: typeof task?.id === "string" && task.id ? task.id : crypto.randomUUID(),
        title: typeof task?.title === "string" && task.title.trim() ? task.title.trim() : "Untitled task",
        notes: typeof task?.notes === "string" ? task.notes : "",
        blockId: typeof task?.blockId === "string" && blocks.some((block) => block.id === task.blockId) ? task.blockId : null,
        parentTaskId: typeof task?.parentTaskId === "string" && task.parentTaskId ? task.parentTaskId : null,
        isDone: Boolean(task?.isDone),
        isCollapsed: Boolean(task?.isCollapsed)
      }));

      const validTaskIds = new Set(normalizedTasks.map((task) => task.id));
      return normalizedTasks.map((task) => ({
        ...task,
        parentTaskId: task.parentTaskId && validTaskIds.has(task.parentTaskId) ? task.parentTaskId : null
      }));
    }

    function buildDefaultTimelineName() {
      return `Timeline ${new Date().toLocaleDateString([], { month: "short", day: "numeric" })}`;
    }

    function formatSavedTimelineDate(value) {
      const date = value ? new Date(value) : new Date();
      if (Number.isNaN(date.getTime())) {
        return "Saved recently";
      }

      return date.toLocaleString([], {
        month: "short",
        day: "numeric",
        hour: "numeric",
        minute: "2-digit"
      });
    }

    function applyBlockOverride(priorityBlock) {
      const nextBlocks = [];
      const removedBlockIds = new Set();

      state.blocks.forEach((block) => {
        if (block.id === priorityBlock.id) {
          return;
        }

        const trimmedBlock = trimBlockAgainstBlock(block, priorityBlock);
        if (trimmedBlock) {
          nextBlocks.push(trimmedBlock);
        } else {
          removedBlockIds.add(block.id);
        }
      });

      nextBlocks.push(priorityBlock);
      state.blocks = nextBlocks;

      if (removedBlockIds.size) {
        state.tasks = state.tasks.map((task) =>
          task.blockId && removedBlockIds.has(task.blockId) ? { ...task, blockId: null } : task
        );
      }
    }

    function trimBlockAgainstBlock(blockToTrim, priorityBlock) {
      const prioritySegments = createBlockSegments(priorityBlock).map((segment) => ({
        start: segment.startMinutes,
        end: segment.endMinutes
      }));

      let remainingSegments = createBlockSegments(blockToTrim).map((segment) => ({
        start: segment.startMinutes,
        end: segment.endMinutes
      }));

      prioritySegments.forEach((prioritySegment) => {
        remainingSegments = subtractSegmentList(remainingSegments, prioritySegment);
      });

      return rebuildBlockFromSegments(blockToTrim, remainingSegments);
    }

    function subtractSegmentList(segments, blocker) {
      return mergeMinuteSegments(
        segments.flatMap((segment) => subtractMinuteSegment(segment, blocker))
      );
    }

    function subtractMinuteSegment(segment, blocker) {
      if (blocker.end <= segment.start || blocker.start >= segment.end) {
        return [segment];
      }

      const fragments = [];

      if (blocker.start > segment.start) {
        fragments.push({
          start: segment.start,
          end: blocker.start
        });
      }

      if (blocker.end < segment.end) {
        fragments.push({
          start: blocker.end,
          end: segment.end
        });
      }

      return fragments.filter((fragment) => fragment.end > fragment.start);
    }

    function mergeMinuteSegments(segments) {
      if (!segments.length) {
        return [];
      }

      const sortedSegments = [...segments].sort((a, b) => a.start - b.start);
      return sortedSegments.reduce((merged, segment) => {
        const lastSegment = merged[merged.length - 1];
        if (lastSegment && segment.start <= lastSegment.end) {
          lastSegment.end = Math.max(lastSegment.end, segment.end);
          return merged;
        }

        merged.push({ ...segment });
        return merged;
      }, []);
    }

    function rebuildBlockFromSegments(originalBlock, segments) {
      const validSegments = mergeMinuteSegments(segments).filter((segment) => segment.end > segment.start);

      if (!validSegments.length) {
        return null;
      }

      if (
        validSegments.length === 2
        && validSegments[0].start === 0
        && validSegments[1].end === MINUTES_IN_DAY
      ) {
        return {
          ...originalBlock,
          startTime: minutesToTime(validSegments[1].start),
          endTime: minutesToTime(validSegments[0].end)
        };
      }

      const keptSegment = validSegments.reduce((longest, segment) =>
        (segment.end - segment.start) > (longest.end - longest.start) ? segment : longest
      );

      return {
        ...originalBlock,
        startTime: minutesToTime(keptSegment.start),
        endTime: minutesToTime(keptSegment.end)
      };
    }

    function persistState(options = {}) {
      const payload = buildPersistedState();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
      scheduleCloudSync(Boolean(options.immediate));
    }

    function hydrateState() {
      const rawState = localStorage.getItem(STORAGE_KEY);
      if (!rawState) {
        return;
      }

      try {
        const parsed = JSON.parse(rawState);
        applyPersistedState(parsed);
      } catch (error) {
        console.error("Failed to restore local app state", error);
      }
    }

    function buildPersistedState() {
      return {
        phases: state.phases,
        blocks: state.blocks,
        tasks: state.tasks,
        savedTimelines: state.savedTimelines,
        ui: {
          isCompactTimeline: state.ui.isCompactTimeline,
          activeTab: state.ui.activeTab
        },
        updatedAt: new Date().toISOString()
      };
    }

    function applyPersistedState(parsed) {
      const savedPhases = Array.isArray(parsed?.phases) ? parsed.phases : [];
      const savedBlocks = Array.isArray(parsed?.blocks) ? parsed.blocks : [];
      const savedTasks = Array.isArray(parsed?.tasks) ? parsed.tasks : [];
      const savedTimelines = Array.isArray(parsed?.savedTimelines) ? parsed.savedTimelines : [];

      if (savedPhases.length) {
        state.phases = savedPhases.map((phase, index) => ({
          id: typeof phase.id === "string" && phase.id ? phase.id : crypto.randomUUID(),
          name: typeof phase.name === "string" && phase.name.trim() ? phase.name.trim() : `Phase ${index + 1}`,
          color: typeof phase.color === "string" && phase.color ? phase.color : COLOR_OPTIONS[index % COLOR_OPTIONS.length].value,
          details: typeof phase.details === "string" ? phase.details.trim() : "",
          isActive: Boolean(phase.isActive)
        }));
      }

      state.blocks = savedBlocks
        .filter((block) => typeof block?.phaseId === "string")
        .map((block) => ({
          id: typeof block.id === "string" && block.id ? block.id : crypto.randomUUID(),
          title: typeof block.title === "string" && block.title.trim() ? block.title.trim() : "Untitled block",
          notes: typeof block.notes === "string" ? block.notes : "",
          phaseId: block.phaseId,
          startTime: normalizeTimeValue(block.startTime),
          endTime: normalizeTimeValue(block.endTime)
        }))
        .filter((block) => state.phases.some((phase) => phase.id === block.phaseId));

      state.tasks = normalizeSavedTasks(savedTasks, state.blocks);

      state.savedTimelines = savedTimelines
        .map((item) => {
          const phases = normalizeSavedPhases(item?.phases);
          const blocks = normalizeSavedBlocks(item?.blocks, phases);
          const tasks = normalizeSavedTasks(item?.tasks, blocks);
          if (!phases.length) {
            return null;
          }

          return {
            id: typeof item?.id === "string" && item.id ? item.id : crypto.randomUUID(),
            name: typeof item?.name === "string" && item.name.trim() ? item.name.trim() : "Saved timeline",
            savedAt: typeof item?.savedAt === "string" && item.savedAt ? item.savedAt : new Date().toISOString(),
            selectedPhaseId: typeof item?.selectedPhaseId === "string" ? item.selectedPhaseId : (phases.find((phase) => phase.isActive)?.id || phases[0]?.id || ""),
            phases,
            blocks,
            tasks
          };
        })
        .filter(Boolean);

      state.ui.isCompactTimeline = Boolean(parsed?.ui?.isCompactTimeline);
      state.ui.activeTab = ["tasks", "phases", "timeline"].includes(parsed?.ui?.activeTab)
        ? parsed.ui.activeTab
        : "timeline";
    }

    function initializeFirebase() {
      if (!isFirebaseConfigured()) {
        state.ui.syncStatus = "Firebase not set";
        return;
      }

      const firebaseApp = initializeApp(FIREBASE_CONFIG);
      firestoreDb = getFirestore(firebaseApp);
      state.ui.syncStatus = "Firebase ready";
    }

    async function hydrateFromCloud() {
      if (!firestoreDb) {
        renderSyncStatus();
        return;
      }

      try {
        state.ui.syncStatus = "Loading cloud";
        renderSyncStatus();

        const snapshot = await getDoc(doc(firestoreDb, FIREBASE_COLLECTION, SHARED_DOCUMENT_ID));

        if (snapshot.exists()) {
          const data = snapshot.data();
          if (data?.payload) {
            applyPersistedState(data.payload);
          state.ui.lastSyncedAt = data.updatedAt || null;
          localStorage.setItem(STORAGE_KEY, JSON.stringify(data.payload));
            render();
          }
        } else {
          const migrated = await migrateLegacyStateToShared();
          if (migrated) {
            render();
          }
        }

        state.ui.syncStatus = "Synced";
        renderSyncStatus();
        subscribeToSharedCloudState();
      } catch (error) {
        console.error("Cloud restore failed", error);
        state.ui.syncStatus = "Cloud error";
        state.ui.syncError = String(error?.message || error);
        renderSyncStatus();
      }
    }

    function scheduleCloudSync(immediate = false) {
      if (!firestoreDb) {
        state.ui.syncStatus = isFirebaseConfigured() ? "Firebase ready" : "Firebase not set";
        renderSyncStatus();
        return;
      }

      state.ui.syncStatus = "Syncing";
      renderSyncStatus();

      window.clearTimeout(cloudSyncTimer);

      if (immediate) {
        void saveToCloud();
        return;
      }

      cloudSyncTimer = window.setTimeout(() => {
        void saveToCloud();
      }, 500);
    }

    async function saveToCloud() {
      if (!firestoreDb) {
        return;
      }

      const payload = buildPersistedState();

      try {
        await setDoc(
          doc(firestoreDb, FIREBASE_COLLECTION, SHARED_DOCUMENT_ID),
          {
            scope: "shared",
            payload,
            updatedAt: payload.updatedAt
          },
          { merge: true }
        );

        state.ui.lastSyncedAt = payload.updatedAt;
        state.ui.syncStatus = "Synced";
        renderSyncStatus();
      } catch (error) {
        console.error("Cloud save failed", error);
        state.ui.syncStatus = "Cloud error";
        state.ui.syncError = String(error?.message || error);
        renderSyncStatus();
      }
    }

    function subscribeToSharedCloudState() {
      if (!firestoreDb || sharedDocUnsubscribe) {
        return;
      }

      sharedDocUnsubscribe = onSnapshot(
        doc(firestoreDb, FIREBASE_COLLECTION, SHARED_DOCUMENT_ID),
        (snapshot) => {
          const data = snapshot.data();
          if (!data?.payload) {
            return;
          }

          if (data.updatedAt && state.ui.lastSyncedAt === data.updatedAt) {
            return;
          }

          applyPersistedState(data.payload);
          state.ui.lastSyncedAt = data.updatedAt || null;
          localStorage.setItem(STORAGE_KEY, JSON.stringify(data.payload));
          state.ui.syncStatus = "Synced";
          render();
        },
        (error) => {
          console.error("Cloud subscription failed", error);
          state.ui.syncStatus = "Cloud error";
          state.ui.syncError = String(error?.message || error);
          renderSyncStatus();
        }
      );
    }

    async function migrateLegacyStateToShared() {
      const localPayload = readLocalPayloadForMigration();
      if (hasMeaningfulState(localPayload)) {
        applyPersistedState(localPayload);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(localPayload));
        await savePayloadToShared(localPayload);
        return true;
      }

      const legacyDeviceId = localStorage.getItem(LEGACY_DEVICE_ID_KEY);
      if (!legacyDeviceId) {
        return false;
      }

      try {
        const legacySnapshot = await getDoc(doc(firestoreDb, FIREBASE_COLLECTION, legacyDeviceId));
        if (!legacySnapshot.exists()) {
          return false;
        }

        const legacyData = legacySnapshot.data();
        if (!hasMeaningfulState(legacyData?.payload)) {
          return false;
        }

        applyPersistedState(legacyData.payload);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(legacyData.payload));
        await savePayloadToShared(legacyData.payload);
        return true;
      } catch (error) {
        console.error("Legacy migration failed", error);
        return false;
      }
    }

    function readLocalPayloadForMigration() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) {
          return null;
        }

        return JSON.parse(raw);
      } catch (error) {
        console.error("Local migration payload read failed", error);
        return null;
      }
    }

    function hasMeaningfulState(payload) {
      if (!payload || typeof payload !== "object") {
        return false;
      }

      const phases = Array.isArray(payload.phases) ? payload.phases : [];
      const blocks = Array.isArray(payload.blocks) ? payload.blocks : [];
      const tasks = Array.isArray(payload.tasks) ? payload.tasks : [];

      return phases.length > 0 || blocks.length > 0 || tasks.length > 0;
    }

    async function savePayloadToShared(payload) {
      await setDoc(
        doc(firestoreDb, FIREBASE_COLLECTION, SHARED_DOCUMENT_ID),
        {
          scope: "shared",
          payload,
          updatedAt: payload.updatedAt || new Date().toISOString()
        },
        { merge: true }
      );
    }

    function isFirebaseConfigured() {
      return Object.values(FIREBASE_CONFIG).every((value) => typeof value === "string" && value.trim());
    }

    function scrollPhaseRailBy(offset) {
      elements.phaseRail.scrollBy({
        left: offset,
        behavior: "smooth"
      });
    }

    function createBlockSegments(block) {
      const startMinutes = timeToMinutes(block.startTime);
      const endMinutes = timeToMinutes(block.endTime);

      if (endMinutes > startMinutes) {
        return [{
          block,
          startMinutes,
          endMinutes,
          isOvernightSegment: false
        }];
      }

      return [
        {
          block,
          startMinutes: 0,
          endMinutes,
          isOvernightSegment: true
        },
        {
          block,
          startMinutes,
          endMinutes: MINUTES_IN_DAY,
          isOvernightSegment: true
        }
      ];
    }

    function timeToMinutes(time) {
      const [hours, minutes] = time.split(":").map(Number);
      return hours * 60 + minutes;
    }

    function minutesToTime(totalMinutes) {
      const normalizedMinutes = ((totalMinutes % MINUTES_IN_DAY) + MINUTES_IN_DAY) % MINUTES_IN_DAY;
      const hours = Math.floor(normalizedMinutes / 60);
      const minutes = normalizedMinutes % 60;
      return `${String(hours).padStart(2, "0")}:${String(minutes).padStart(2, "0")}`;
    }

    function timelineOffsetForMinute(minutes) {
      return 18 + (minutes / 60) * getPixelsPerHour();
    }

    function getPixelsPerHour() {
      return state.ui.isCompactTimeline ? 24 : 68;
    }

    function getMinBlockHeight() {
      return state.ui.isCompactTimeline ? 42 : 64;
    }

    function formatHour(hour) {
      const suffix = hour >= 12 ? "PM" : "AM";
      const normalizedHour = hour % 12 === 0 ? 12 : hour % 12;
      const icon = getPremiumHourIcon(hour);
      return `<span class="hour-label"><span class="hour-icon ${icon.className}" aria-hidden="true">${icon.svg}</span><span>${normalizedHour} ${suffix}</span></span>`;
    }

    function getHourIcon(hour) {
      if (hour >= 0 && hour < 4) {
        return { symbol: "☾", className: "night" };
      }

      if (hour >= 4 && hour < 6) {
        return { symbol: "◔", className: "dawn" };
      }

      if (hour >= 6 && hour < 11) {
        return { symbol: "🌅", className: "sunrise" };
      }

      if (hour >= 11 && hour < 16) {
        return { symbol: "☀", className: "day" };
      }

      if (hour >= 16 && hour < 18) {
        return { symbol: "🌇", className: "sunset" };
      }

      if (hour >= 18 && hour < 20) {
        return { symbol: "◕", className: "dusk" };
      }

      return { symbol: "☾", className: "night" };
    }

    function getPremiumHourIcon(hour) {
      if (hour >= 0 && hour < 4) {
        return { className: "night", svg: getMoonIconSvg() };
      }

      if (hour >= 4 && hour < 6) {
        return { className: "dawn", svg: getDawnIconSvg() };
      }

      if (hour >= 6 && hour < 11) {
        return { className: "sunrise", svg: getSunriseIconSvg() };
      }

      if (hour >= 11 && hour < 16) {
        return { className: "day", svg: getSunIconSvg() };
      }

      if (hour >= 16 && hour < 18) {
        return { className: "sunset", svg: getSunsetIconSvg() };
      }

      if (hour >= 18 && hour < 20) {
        return { className: "dusk", svg: getDuskIconSvg() };
      }

      return { className: "night", svg: getMoonIconSvg() };
    }

        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">

        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">

    }

    function formatBlockTimeRange(startTime, endTime, isOvernight = false) {
      const overnightSuffix = isOvernight && state.ui.isCompactTimeline ? " *" : isOvernight ? " - Overnight" : "";
      return `${formatTimeValue(startTime)} - ${formatTimeValue(endTime)}${overnightSuffix}`;
    }

    function formatTimeRange(startTime, endTime, isOvernight = false) {
      const overnightSuffix = isOvernight ? " · Overnight" : "";
      return `${formatTimeValue(startTime)} - ${formatTimeValue(endTime)}${overnightSuffix}`;
    }

    function formatTimeValue(time) {
      const [rawHour, rawMinute] = time.split(":").map(Number);
      const suffix = rawHour >= 12 ? "PM" : "AM";
      const hour = rawHour % 12 === 0 ? 12 : rawHour % 12;
      return `${hour}:${String(rawMinute).padStart(2, "0")} ${suffix}`;
    }

    function formatDisplayTime(date) {
      return date.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
    }

    function normalizeTimeValue(time) {
      if (typeof time !== "string" || !/^\d{2}:\d{2}$/.test(time)) {
        return "09:00";
      }

      return time;
    }

    function registerServiceWorker() {
      if (!("serviceWorker" in navigator)) {
        return;
      }

      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch((error) => {
          console.error("Service worker registration failed", error);
        });
      });
    }

    function escapeHtml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    void initialize();
  </script>
</body>
</html>
